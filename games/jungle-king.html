<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Jungle Frenzy 🐾</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1a2a1a;
      font-family: Arial;
    }

    #viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      /* cursor: none; */
    }

    #world {
      position: absolute;
      width: 3000px;
      height: 3000px;
      background: radial-gradient(circle, #2e4d2e, #162616);
    }

    .animal {
      position: absolute;
      user-select: none;
      transition: transform 0.1s;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10;
    }

    #startScreen,
    #gameOver {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 20;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .invincible {
      filter: drop-shadow(0 0 10px yellow);
    }

    .hide-cursor {
      cursor: none;
    }
  </style>
</head>

<body>

  <div id="viewport">
    <div id="world"></div>

    <div id="ui">
      Size: <span id="size">1</span><br />
      Level: <span id="level">1</span><br />
      XP: <span id="xp">0</span>
      <div style="width:200px;height:10px;background:#555;margin-top:5px;border-radius:5px;">
        <div id="xpBar" style="height:100%;width:0%;background:lime;border-radius:5px;"></div>
      </div>
      <div id="statusText" style="margin-top:8px;font-size:13px;opacity:0.9;min-height:16px;"></div>
    </div>

    <div id="startScreen">
      <h1>🐾 Jungle King</h1>

      <div style="max-width:400px;text-align:left;font-size:14px;line-height:1.6;">
        <b>🎮 How to play:</b><br /><br />
        🐭 Move with your mouse<br />
        🍖 Eat smaller or equal-sized animals to gain XP<br />
        🧬 Level up to evolve<br />
        🐅 Bigger animals will chase you<br />
        🏃 Escape to survive!<br />
      </div>


      <button style="margin-top: 2rem;" onclick="startGame()">Start</button>
    </div>

    <div id="gameOver" style="display:none;">
      <h1>💀 Game Over</h1>
      <button onclick="restart()">Restart</button>
    </div>
  </div>

  <script>
    const world = document.getElementById("world");
    const sizeText = document.getElementById("size");
    const levelText = document.getElementById("level");
    const xpText = document.getElementById("xp");
    const xpBar = document.getElementById("xpBar");
    const statusText = document.getElementById("statusText");
    let xp = 0;
    let level = 1;

    const animalsData = [
      "🐭", "🐹", "🐰", "🐸", "🐔", "🦆", "🐷","🐮", "🐱", "🐶", "🐗", "🦊", "🐺",
      "🐯", "🦁", "🐻", "🐼", "🐻‍❄️", "🐘", "🦣"
    ].map((emoji, i) => ({ emoji, size: i + 1 }));

    let player, animals = [];
    let mouseX = 0, mouseY = 0;
    let running = false;
    let invincible = false;
    let statusTimer;

    const WORLD_SIZE = 3000;
    const BASE_POPULATION = 90;
    const SAFE_SPAWN_RADIUS = 300;
    const PLAYER_ACCEL = 0.5;
    const WANDER_TURN_RATE = 0.02;
    const WIN_LEVEL = animalsData.length;

    document.addEventListener("mousemove", e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function showStatus(message, ms = 900) {
      statusText.innerText = message;
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => {
        statusText.innerText = "";
      }, ms);
    }

    function getPlayerMaxSpeed(size) {
      return Math.max(2.4, 6.8 - size * 0.2);
    }

    function getSpawnPosition(avoidPlayer = true) {
      let x = Math.random() * WORLD_SIZE;
      let y = Math.random() * WORLD_SIZE;

      if (!avoidPlayer || !player) return { x, y };

      let tries = 0;
      while (tries < 30) {
        const dx = x - player.x;
        const dy = y - player.y;
        if (Math.hypot(dx, dy) >= SAFE_SPAWN_RADIUS) break;
        x = Math.random() * WORLD_SIZE;
        y = Math.random() * WORLD_SIZE;
        tries++;
      }
      return { x, y };
    }

    function createAnimal(data, isPlayer = false, avoidPlayerSpawn = true) {
      const el = document.createElement("div");
      el.className = "animal";
      el.innerText = data.emoji;
      const spawnPos = getSpawnPosition(avoidPlayerSpawn);

      let obj = {
        el,
        size: data.size,
        x: spawnPos.x,
        y: spawnPos.y,
        speed: 1 + Math.random() * 1.5,
        isPlayer,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2
      };

      const debug = document.createElement("div");
      debug.style.position = "absolute";
      debug.style.border = "1px solid red";
      debug.style.borderRadius = "50%";
      debug.style.pointerEvents = "none";
      debug.style.display = "none"; // toggle later

      world.appendChild(debug);

      obj.debug = debug;

      world.appendChild(el);
      animals.push(obj);
      return obj;
    }

    function pickSpawnDataByLevel() {
      const maxSize = animalsData[animalsData.length - 1].size;
      const playerSize = player ? player.size : 1;
      const levelPressure = Math.min(level / maxSize, 1);

      let preferredMin = Math.max(1, playerSize - 2);
      let preferredMax = Math.min(maxSize, playerSize + 3 + Math.floor(levelPressure * 4));
      if (preferredMin > preferredMax) {
        preferredMin = preferredMax;
      }

      const pool = animalsData.filter(a => a.size >= preferredMin && a.size <= preferredMax);
      if (pool.length === 0) {
        return animalsData[0];
      }

      const preyPool = pool.filter(a => a.size <= playerSize);
      const threatPool = pool.filter(a => a.size > playerSize);
      const preyChance = Math.max(0.42, 0.74 - levelPressure * 0.34);

      if (preyPool.length > 0 && Math.random() < preyChance) {
        return preyPool[Math.floor(Math.random() * preyPool.length)];
      }
      if (threatPool.length > 0) {
        return threatPool[Math.floor(Math.random() * threatPool.length)];
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function spawnInitialAnimals() {
      for (let i = 0; i < BASE_POPULATION; i++) {
        const data = pickSpawnDataByLevel();
        createAnimal(data, false, true);
      }

      // keep early game smooth with extra edible animals
      for (let i = 0; i < 20; i++) {
        createAnimal(animalsData[0], false, true);
      }
    }

    function spawnAnimalsRandomly() {
      for (let i = 0; i < 30; i++) {
        let data = animalsData[Math.floor(Math.random() * animalsData.length)];
        createAnimal(data);
      }
    }

    function respawnOneAnimal() {
      if (!running) return;
      const data = pickSpawnDataByLevel();
      createAnimal(data, false, true);
    }

    function maintainPopulation() {
      const targetPopulation = BASE_POPULATION + Math.min(20, level);
      while (animals.length - 1 < targetPopulation) {
        respawnOneAnimal();
      }
    }

    function startGame() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("gameOver").style.display = "none";
      document.querySelector("#gameOver h1").innerText = "💀 Game Over";
      running = true;
      xp = 0;
      level = 1;
      animals = [];
      world.innerHTML = "";
      showStatus("Eat smaller animals to grow!");

      player = createAnimal(animalsData[level - 1], true, false);

      // spawn away from center for fairness
      player.x = WORLD_SIZE / 2;
      player.y = WORLD_SIZE / 2;
      player.vx = 0;
      player.vy = 0;

      spawnAnimalsRandomly();
      spawnInitialAnimals();

      // 🛡️ INVINCIBLE 3s
      invincible = true;
      player.el.classList.add("invincible");

      setTimeout(() => {
        invincible = false;
        player.el.classList.remove("invincible");
      }, 3000);

      //viewport.classList.add("hide-cursor");

      gameLoop();
    }

    function restart() {
      location.reload();
    }

    function getXPNeeded(level) {
      // quick early growth, tighter mid/late pacing
      return Math.floor(4 + level * 2.2 + level * level * 0.08);
    }

    function endGame(win = false) {
      running = false;
      const title = document.querySelector("#gameOver h1");
      title.innerText = win ? "🏆 You Rule The Jungle!" : "💀 Game Over";
      document.getElementById("gameOver").style.display = "flex";
      if (win) {
        showStatus("Final evolution reached!", 1600);
      }
    }

    function gainXP(amount) {
      xp += amount;

      while (xp >= getXPNeeded(level)) {
        xp -= getXPNeeded(level);
        level++;
        if (level >= WIN_LEVEL) {
          level = WIN_LEVEL;
          evolveByLevel();
          endGame(true);
          return;
        }
        evolveByLevel();
      }
    }

    function evolveByLevel() {
      let next = animalsData.find(a => a.size === level);
      if (next) {
        player.size = next.size;
        player.el.innerText = next.emoji;

        // ✨ small visual feedback
        player.el.style.transform = "scale(1.5)";
        setTimeout(() => {
          player.el.style.transform = "scale(1)";
        }, 200);
      }
    }

    function updateCamera() {
      let offsetX = window.innerWidth / 2 - player.x;
      let offsetY = window.innerHeight / 2 - player.y;

      world.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    }

    let debugMode = false;

    document.addEventListener("keydown", e => {
      if (e.key === "d") {
        debugMode = !debugMode;

        animals.forEach(a => {
          a.debug.style.display = debugMode ? "block" : "none";
        });
      }
    });

    function gameLoop() {
      if (!running) return;

      animals.forEach(a => {
        const rect = a.el.getBoundingClientRect();
        let radius = rect.width * 0.4;

        a.debug.style.width = radius * 2 + "px";
        a.debug.style.height = radius * 2 + "px";
        a.debug.style.left = (a.x - radius) + "px";
        a.debug.style.top = (a.y - radius) + "px";
        if (a.isPlayer) {
          let worldMouseX = player.x + (mouseX - window.innerWidth / 2);
          let worldMouseY = player.y + (mouseY - window.innerHeight / 2);

          const maxSpeed = getPlayerMaxSpeed(a.size);
          const dx = worldMouseX - a.x;
          const dy = worldMouseY - a.y;
          const dist = Math.hypot(dx, dy);

          if (dist > 1) {
            const targetVx = (dx / dist) * Math.min(maxSpeed, dist * 0.12);
            const targetVy = (dy / dist) * Math.min(maxSpeed, dist * 0.12);
            a.vx += (targetVx - a.vx) * PLAYER_ACCEL;
            a.vy += (targetVy - a.vy) * PLAYER_ACCEL;
          } else {
            a.vx *= 0.85;
            a.vy *= 0.85;
          }

          const speed = Math.hypot(a.vx, a.vy);
          if (speed > maxSpeed) {
            a.vx = (a.vx / speed) * maxSpeed;
            a.vy = (a.vy / speed) * maxSpeed;
          }

          a.x += a.vx;
          a.y += a.vy;
        } else {
          let dx = player.x - a.x;
          let dy = player.y - a.y;
          let dist = Math.hypot(dx, dy);
          let dirX = dist > 0 ? dx / dist : 0;
          let dirY = dist > 0 ? dy / dist : 0;

          const sizeGap = a.size - player.size;
          const chaseRange = 200;
          const fleeRange = 170 + Math.max(0, player.size - a.size) * 20;

          if (a.size > player.size && dist < chaseRange) {
            // chase
            a.x += dirX * a.speed * (1.45 + sizeGap * 0.1);
            a.y += dirY * a.speed * (1.45 + sizeGap * 0.1);
          } else if (a.size < player.size && dist < fleeRange) {
            // flee from larger player
            a.x -= dirX * a.speed * 1.8;
            a.y -= dirY * a.speed * 1.8;
          } else {
            a.x += a.vx * a.speed;
            a.y += a.vy * a.speed;

            if (Math.random() < WANDER_TURN_RATE) {
              a.vx = (Math.random() - 0.5) * 2;
              a.vy = (Math.random() - 0.5) * 2;
            }
          }
        }

        a.x = Math.max(0, Math.min(WORLD_SIZE, a.x));
        a.y = Math.max(0, Math.min(WORLD_SIZE, a.y));

        //const rect = a.el.getBoundingClientRect();
        let halfW = rect.width / 2;
        let halfH = rect.height / 2;

        a.el.style.left = (a.x - halfW) + "px";
        a.el.style.top = (a.y - halfH) + "px";
        a.el.style.fontSize = (16 + a.size * 7) + "px";
      });

      // collision
      animals.forEach(a => {
        if (a === player) return;

        let dx = player.x - a.x;
        let dy = player.y - a.y;
        let dist = Math.hypot(dx, dy);

        const rectA = player.el.getBoundingClientRect();
        const rectB = a.el.getBoundingClientRect();

        let playerRadius = rectA.width * 0.4;
        let targetRadius = rectB.width * 0.4;

        if (dist < playerRadius + targetRadius) {
          if (player.size >= a.size) {
            a.el.remove();
            a.debug.remove();
            animals = animals.filter(x => x !== a);

            // 🍖 XP based on prey size
            gainXP(a.size);
            respawnOneAnimal();
          } else if (!invincible) {
            endGame(false);
          } else {
            showStatus("Too big to eat!", 450);
          }
        }
      });

      maintainPopulation();
      updateCamera();
      sizeText.innerText = player.size;

      xpText.innerText = xp;
      levelText.innerText = level;

      let percent = (xp / getXPNeeded(level)) * 100;
      xpBar.style.width = percent + "%";



      requestAnimationFrame(gameLoop);
    }
  </script>

</body>

</html>
