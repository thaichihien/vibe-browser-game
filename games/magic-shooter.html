<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Shooter</title>
<style>
  :root {
    --magic: #a06bff;
    --hp: #ff3b5c;
    --ui-bg: rgba(10, 8, 20, 0.72);
    --ui-border: rgba(160, 107, 255, 0.35);
    --text: #e8e2ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0716; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); user-select: none; }
  canvas { display: block; }

  .overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(ellipse at center, rgba(20,12,40,0.88) 0%, rgba(5,3,12,0.96) 100%);
    z-index: 20;
  }
  #no-internet { z-index: 30; text-align: center; }
  #no-internet h2 { color: var(--magic); margin-bottom: 12px; }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
  #crosshair {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 14px; height: 14px; border: 2px solid var(--magic); border-radius: 50%;
    box-shadow: 0 0 8px var(--magic);
  }
  #health-bar { position: absolute; left: 24px; bottom: 96px; }
  #wave-info { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); text-align: center; }
  #hotbar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
</style>
</head>
<body>
<div id="hud">
  <div id="crosshair"></div>
  <div id="health-bar"></div>
  <div id="wave-info"></div>
  <div id="hotbar"></div>
</div>

<div id="start-screen" class="overlay"></div>
<div id="pause-screen" class="overlay"></div>
<div id="gameover-screen" class="overlay"></div>
<div id="spell-grid" class="overlay"></div>
<div id="no-internet" class="overlay">
  <h2>⚡ Magic Shooter needs an internet connection</h2>
  <p>The 3D engine (Three.js) could not be loaded. Check your connection and reload the page.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ===== Game namespace & globals =====
const G = {
  state: 'menu', // 'menu' | 'playing' | 'paused' | 'gameover'
  wave: 0, kills: 0, score: 0,
  spellIndex: 0,
};
let scene, camera, renderer;
const arena = { size: 80, wallHeight: 12, colliders: [] };

// ===== Arena =====
const MATS = {};
function buildMaterials() {
  MATS.floor  = new THREE.MeshStandardMaterial({ color: 0x14101f, roughness: 0.9, metalness: 0.15 });
  MATS.wall   = new THREE.MeshStandardMaterial({ color: 0x1c1430, roughness: 0.85 });
  MATS.pillar = new THREE.MeshStandardMaterial({ color: 0x241a3e, roughness: 0.7, emissive: 0x150a30 });
  MATS.block  = new THREE.MeshStandardMaterial({ color: 0x2a1f4a, roughness: 0.75, emissive: 0x0c0620 });
  MATS.trimCyan    = new THREE.MeshBasicMaterial({ color: 0x2ee6ff });
  MATS.trimMagenta = new THREE.MeshBasicMaterial({ color: 0xff2ee6 });
}

// Adds a box mesh centered at (x, y+h/2, z) and registers its AABB collider.
function addBox(x, y, z, w, h, d, mat, noCollide) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y + h / 2, z);
  scene.add(mesh);
  if (!noCollide) {
    arena.colliders.push({
      min: new THREE.Vector3(x - w / 2, y, z - d / 2),
      max: new THREE.Vector3(x + w / 2, y + h, z + d / 2),
    });
  }
  return mesh;
}

function buildArena() {
  buildMaterials();
  const S = arena.size, H = arena.wallHeight, half = S / 2;

  // Floor + grid
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(S, S), MATS.floor);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  const grid = new THREE.GridHelper(S, 40, 0x4a2a8a, 0x2a1a4a);
  grid.position.y = 0.02;
  scene.add(grid);

  // Outer walls (thickness 2, just outside the play area)
  addBox(0, 0, -half - 1, S + 4, H, 2, MATS.wall);
  addBox(0, 0,  half + 1, S + 4, H, 2, MATS.wall);
  addBox(-half - 1, 0, 0, 2, H, S + 4, MATS.wall);
  addBox( half + 1, 0, 0, 2, H, S + 4, MATS.wall);

  // Neon trim strips along wall bases
  const trims = [
    [0, -half + 0.05, S, 0.25, 0.3, MATS.trimCyan],
    [0,  half - 0.05, S, 0.25, 0.3, MATS.trimMagenta],
  ];
  for (const [x, z, w, h, d, m] of trims) {
    addBox(x, 0, z, w, h, d, m, true);
    addBox(z, 0, x, d, h, w, m === MATS.trimCyan ? MATS.trimMagenta : MATS.trimCyan, true);
  }

  // Pillars (6)
  const pillarSpots = [[-24, -24], [24, -24], [-24, 24], [24, 24], [0, -30], [0, 30]];
  for (const [x, z] of pillarSpots) {
    addBox(x, 0, z, 3, H - 2, 3, MATS.pillar);
    addBox(x, H - 2, z, 3.6, 0.4, 3.6, MATS.trimCyan, true);
  }

  // Jumpable blocks (heights 1.5 -> 4, chained near center-east)
  const blocks = [
    [10, 4, 1.5], [15, 8, 2.2], [20, 12, 3.0], [25, 16, 4.0],
    [-12, -8, 1.5], [-18, -14, 2.5], [-8, 14, 2.0], [14, -18, 3.2],
  ];
  for (const [x, z, h] of blocks) addBox(x, 0, z, 4, h, 4, MATS.block);

  // Ramps: stepped thin boxes rising to height 3 (AABB-friendly stairs)
  buildRamp(-30, 0, 1, 0);   // rises east
  buildRamp(30, 8, -1, 0);   // rises west
}

function buildRamp(x, z, dirX, dirZ) {
  const steps = 5, stepH = 0.6, stepLen = 1.6;
  for (let i = 0; i < steps; i++) {
    addBox(x + dirX * i * stepLen, 0, z + dirZ * i * stepLen,
      dirX ? stepLen : 4, stepH * (i + 1), dirZ ? stepLen : 4, MATS.block);
  }
}

function buildLights() {
  scene.add(new THREE.AmbientLight(0x332244, 1.2));
  scene.add(new THREE.HemisphereLight(0x5a3aa0, 0x120a24, 0.8));
  const lightSpots = [
    [-24, -24, 0x2ee6ff], [24, 24, 0xff2ee6], [0, 0, 0xa06bff],
  ];
  for (const [x, z, c] of lightSpots) {
    const l = new THREE.PointLight(c, 0.9, 55);
    l.position.set(x, arena.wallHeight - 2, z);
    scene.add(l);
  }
}

// ===== Input =====
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });

// ===== Player =====
const player = {
  pos: new THREE.Vector3(0, 0, 20),
  vel: new THREE.Vector3(),
  yaw: Math.PI, pitch: 0,
  onGround: false,
  hp: 100, maxHp: 100,
  radius: 0.5, height: 1.7,
};

const LOOK_SENS = 0.0022;
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== renderer.domElement) return;
  player.yaw -= e.movementX * LOOK_SENS;
  player.pitch -= e.movementY * LOOK_SENS;
  const lim = Math.PI / 2 - 0.02;
  player.pitch = Math.max(-lim, Math.min(lim, player.pitch));
});

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) {
    G.state = 'playing';
    if (G.wave === 0) spawnWave(1);
    for (const id of ['start-screen', 'pause-screen', 'spell-grid'])
      document.getElementById(id).style.display = 'none';
    document.getElementById('hud').style.display = 'block';
  } else if (G.state === 'playing') {
    pauseGame();
  }
});

function requestPlay() {
  if (G.state === 'gameover') return; // restart handled by UI
  renderer.domElement.requestPointerLock();
}

function pauseGame() {
  G.state = 'paused';
  document.getElementById('pause-screen').style.display = 'flex';
}

// Resolves movement against arena colliders one axis at a time.
// Shared by the player and ground enemies. Returns { onGround }.
function moveWithCollision(pos, vel, radius, height, dt) {
  let onGround = false;
  const half = arena.size / 2 - radius;

  // X axis
  pos.x += vel.x * dt;
  pos.x = Math.max(-half, Math.min(half, pos.x));
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      pos.x = vel.x > 0 ? c.min.x - radius : c.max.x + radius;
    }
  }
  // Z axis
  pos.z += vel.z * dt;
  pos.z = Math.max(-half, Math.min(half, pos.z));
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      pos.z = vel.z > 0 ? c.min.z - radius : c.max.z + radius;
    }
  }
  // Y axis
  pos.y += vel.y * dt;
  if (pos.y <= 0) { pos.y = 0; vel.y = 0; onGround = true; }
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      if (vel.y <= 0 && pos.y >= c.max.y - 1.0) {
        pos.y = c.max.y; vel.y = 0; onGround = true;   // land on top
      } else if (vel.y > 0) {
        pos.y = c.min.y - height; vel.y = 0;           // bump head
      } else {
        // walked into a side while falling: push out along shallowest axis
        const pushX = pos.x < (c.min.x + c.max.x) / 2 ? c.min.x - radius : c.max.x + radius;
        const pushZ = pos.z < (c.min.z + c.max.z) / 2 ? c.min.z - radius : c.max.z + radius;
        if (Math.abs(pushX - pos.x) < Math.abs(pushZ - pos.z)) pos.x = pushX; else pos.z = pushZ;
      }
    }
  }
  return { onGround };
}

function overlaps(pos, radius, height, c) {
  return pos.x + radius > c.min.x && pos.x - radius < c.max.x &&
         pos.z + radius > c.min.z && pos.z - radius < c.max.z &&
         pos.y < c.max.y && pos.y + height > c.min.y;
}

const GRAVITY = -28, WALK = 8, SPRINT = 12, JUMP_V = 10.5, AIR_CONTROL = 0.35;

function updatePlayer(dt) {
  const fwd = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0);
  const strafe = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
  const speed = keys.ShiftLeft ? SPRINT : WALK;

  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  let wx = (-sin * fwd + cos * strafe);
  let wz = (-cos * fwd - sin * strafe);
  const len = Math.hypot(wx, wz) || 1;
  wx = wx / len * speed; wz = wz / len * speed;

  const ctrl = player.onGround ? 1 : AIR_CONTROL;
  player.vel.x += (wx - player.vel.x) * Math.min(1, dt * 14 * ctrl);
  player.vel.z += (wz - player.vel.z) * Math.min(1, dt * 14 * ctrl);

  if (keys.Space && player.onGround) { player.vel.y = JUMP_V; player.onGround = false; }
  player.vel.y += GRAVITY * dt;

  const res = moveWithCollision(player.pos, player.vel, player.radius, player.height, dt);
  player.onGround = res.onGround;

  camera.position.set(player.pos.x, player.pos.y + player.height, player.pos.z);
  camera.rotation.set(player.pitch, player.yaw, 0);
}

function damagePlayer(amount) {
  if (G.state !== 'playing') return;
  player.hp = Math.max(0, player.hp - amount);
  if (player.hp <= 0) gameOver();
}

function gameOver() {
  G.state = 'gameover';
  document.exitPointerLock();
  console.log('GAME OVER — wave', G.wave, 'kills', G.kills, 'score', G.score);
}

// ===== Spells =====

function selectSpell(i) {
  G.spellIndex = ((i % SPELLS.length) + SPELLS.length) % SPELLS.length;
  const def = SPELLS[G.spellIndex];
  const css = '#' + def.color.toString(16).padStart(6, '0');
  const ch = document.getElementById('crosshair');
  ch.style.borderColor = css;
  ch.style.boxShadow = `0 0 8px ${css}`;
  updateHotbarUI();
}

function updateHotbarUI() {
  const bar = document.getElementById('hotbar');
  if (!bar || !bar.children.length) return;
  for (let i = 0; i < bar.children.length; i++)
    bar.children[i].classList.toggle('active', i === G.spellIndex);
  const label = document.getElementById('active-spell');
  if (label) {
    const def = SPELLS[G.spellIndex];
    label.textContent = `${def.icon} ${def.name}`;
    label.style.color = '#' + def.color.toString(16).padStart(6, '0');
  }
}

addEventListener('keydown', e => {
  if (G.state !== 'playing') return;
  if (e.code.startsWith('Digit')) {
    const n = Number(e.code.slice(5));
    selectSpell(n === 0 ? 9 : n - 1);
  }
  if (e.code === 'KeyQ') selectSpell(G.spellIndex - 1);
  if (e.code === 'KeyE') selectSpell(G.spellIndex + 1);
});
addEventListener('wheel', e => {
  if (G.state !== 'playing') return;
  selectSpell(G.spellIndex + (e.deltaY > 0 ? 1 : -1));
});

// ===== Projectiles =====
const PROJ_POOL_SIZE = 200;
const projectiles = [];
const projGeo = new THREE.SphereGeometry(0.18, 8, 8);
const projMats = {};
function projMat(color) {
  if (!projMats[color]) projMats[color] = new THREE.MeshBasicMaterial({ color });
  return projMats[color];
}

function getProjectile() {
  for (const p of projectiles) if (!p.alive) return p;
  if (projectiles.length >= PROJ_POOL_SIZE) return null;
  const p = { mesh: new THREE.Mesh(projGeo, projMat(0xffffff)), vel: new THREE.Vector3(),
              def: null, age: 0, bounces: 0, pierced: new Set(), alive: false,
              hostile: false, damage: 0, returning: false };
  scene.add(p.mesh);
  projectiles.push(p);
  return p;
}

function spawnProjectile(def, origin, dir, opts = {}) {
  const p = getProjectile();
  if (!p) return null;
  p.def = def;
  p.mesh.material = projMat(opts.color !== undefined ? opts.color : def.color);
  p.mesh.position.copy(origin);
  p.mesh.visible = true;
  p.vel.copy(dir).multiplyScalar(opts.speed !== undefined ? opts.speed : def.speed);
  p.age = 0; p.bounces = 0; p.pierced.clear();
  p.alive = true;
  p.hostile = !!opts.hostile;
  p.damage = opts.damage !== undefined ? opts.damage : def.damage;
  p.returning = false;
  const s = opts.scale || 1;
  p.mesh.scale.setScalar(s);
  return p;
}

function killProjectile(p) {
  p.alive = false;
  p.mesh.visible = false;
}

// Returns { collider, normal } if point is inside any collider (or outside walls).
function projectileWallHit(pos) {
  const half = arena.size / 2;
  if (Math.abs(pos.x) > half || Math.abs(pos.z) > half || pos.y < 0 || pos.y > arena.wallHeight + 8) {
    const n = new THREE.Vector3();
    if (pos.x > half) n.set(-1, 0, 0); else if (pos.x < -half) n.set(1, 0, 0);
    else if (pos.z > half) n.set(0, 0, -1); else if (pos.z < -half) n.set(0, 0, 1);
    else if (pos.y < 0) n.set(0, 1, 0); else n.set(0, -1, 0);
    return { normal: n };
  }
  for (const c of arena.colliders) {
    if (pos.x > c.min.x && pos.x < c.max.x && pos.y > c.min.y && pos.y < c.max.y &&
        pos.z > c.min.z && pos.z < c.max.z) {
      // normal = axis of least penetration
      const dists = [
        [pos.x - c.min.x, new THREE.Vector3(-1, 0, 0)], [c.max.x - pos.x, new THREE.Vector3(1, 0, 0)],
        [pos.y - c.min.y, new THREE.Vector3(0, -1, 0)], [c.max.y - pos.y, new THREE.Vector3(0, 1, 0)],
        [pos.z - c.min.z, new THREE.Vector3(0, 0, -1)], [c.max.z - pos.z, new THREE.Vector3(0, 0, 1)],
      ];
      dists.sort((a, b) => a[0] - b[0]);
      return { normal: dists[0][1] };
    }
  }
  return null;
}

// Behavior hooks — extended with the full dispatch in the behaviors section.
function onProjectileHitWall(p, hit) {
  killProjectile(p);
}

function onProjectileHitEnemy(p, enemy) {
  damageEnemy(enemy, p.damage, p.def);
  killProjectile(p);
}

function updateProjectiles(dt) {
  for (const p of projectiles) {
    if (!p.alive) continue;
    p.age += dt;
    if (p.age > 6) { killProjectile(p); continue; }
    p.mesh.position.addScaledVector(p.vel, dt);

    const hit = projectileWallHit(p.mesh.position);
    if (hit) { onProjectileHitWall(p, hit); continue; }

    if (p.hostile) {
      const target = new THREE.Vector3(player.pos.x, player.pos.y + 1, player.pos.z);
      if (p.mesh.position.distanceTo(target) < player.radius + 0.8) {
        damagePlayer(p.damage);
        killProjectile(p);
      }
    } else {
      for (const e of enemies) {
        if (!e.alive || p.pierced.has(e)) continue;
        const center = e.pos.clone().add(new THREE.Vector3(0, e.type === 'flyer' ? 0 : 1, 0));
        if (p.mesh.position.distanceTo(center) < e.radius + 0.3) {
          onProjectileHitEnemy(p, e);
          break;
        }
      }
    }
  }
}

// ===== Shooting =====
let mouseDown = false, fireCooldown = 0;
addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });

function shootDirection() {
  return new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
}

function muzzleOrigin() {
  const dir = shootDirection();
  const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  return camera.position.clone().addScaledVector(dir, 0.6).addScaledVector(right, 0.25).add(new THREE.Vector3(0, -0.2, 0));
}

function tryShoot(dt) {
  fireCooldown -= dt;
  if (!mouseDown || fireCooldown > 0) return;
  const def = SPELLS[G.spellIndex];
  fireCooldown = 1 / def.fireRate;
  fireSpell(def);
}

// Overridden by the behaviors section for scatter/chaos/arc special firing.
function fireSpell(def) {
  spawnProjectile(def, muzzleOrigin(), shootDirection());
}

// ===== Enemies =====
const ENEMY_TYPES = {
  grunt:   { hp: 30,  speed: 5,   radius: 0.9, score: 10, firstWave: 1,
             melee: 10, meleeRate: 0.8, meleeRange: 1.8, color: 0xff3b5c },
  spitter: { hp: 22,  speed: 3.5, radius: 0.9, score: 20, firstWave: 2,
             shot: 8, shotRate: 2, keepMin: 12, keepMax: 18, color: 0x6aff4a },
  flyer:   { hp: 14,  speed: 8,   radius: 0.7, score: 30, firstWave: 3,
             ram: 6, ramRate: 1.0, color: 0x2ee6ff },
  tank:    { hp: 120, speed: 2,   radius: 1.6, score: 40, firstWave: 4,
             melee: 22, meleeRate: 1.2, meleeRange: 2.6, color: 0xff9a3c },
};

function buildEnemyMesh(type) {
  const t = ENEMY_TYPES[type];
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: t.color, emissive: t.color,
    emissiveIntensity: 0.45, roughness: 0.5, flatShading: true });
  let body;
  if (type === 'grunt') {
    body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.9, 0), mat);
    body.position.y = 0.9;
    const hornGeo = new THREE.ConeGeometry(0.15, 0.6, 4);
    for (const s of [-1, 1]) {
      const horn = new THREE.Mesh(hornGeo, mat);
      horn.position.set(s * 0.45, 1.7, 0);
      g.add(horn);
    }
  } else if (type === 'spitter') {
    body = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.8, 6), mat);
    body.position.y = 0.9;
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff }));
    eye.position.set(0, 1.3, 0.55);
    g.add(eye);
  } else if (type === 'flyer') {
    body = new THREE.Mesh(new THREE.TetrahedronGeometry(0.8), mat);
    body.position.y = 0.7;
  } else { // tank
    body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.4, 1.8), mat);
    body.position.y = 0.7;
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 1.2), mat);
    top.position.y = 1.9;
    g.add(top);
  }
  g.add(body);
  g.userData.body = body;

  // Health bar sprite
  const cv = document.createElement('canvas'); cv.width = 64; cv.height = 8;
  const tex = new THREE.CanvasTexture(cv);
  const bar = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  bar.scale.set(1.6, 0.2, 1);
  bar.position.y = type === 'tank' ? 3.0 : 2.3;
  g.add(bar);
  g.userData.hpBar = { cv, tex, bar };
  return g;
}

function drawHpBar(enemy) {
  const { cv, tex } = enemy.mesh.userData.hpBar;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 64, 8);
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, 64, 8);
  ctx.fillStyle = enemy.hp / enemy.maxHp > 0.4 ? '#5aff7a' : '#ff3b5c';
  ctx.fillRect(1, 1, 62 * Math.max(0, enemy.hp / enemy.maxHp), 6);
  tex.needsUpdate = true;
}

const enemies = [];

function spawnEnemy(type, pos) {
  const t = ENEMY_TYPES[type];
  const scale = 1 + 0.08 * (G.wave - 1);
  const e = {
    type, def: t,
    mesh: buildEnemyMesh(type),
    pos: pos.clone(), vel: new THREE.Vector3(),
    hp: Math.round(t.hp * scale), maxHp: Math.round(t.hp * scale),
    speed: t.speed * Math.min(1.6, 1 + 0.03 * (G.wave - 1)),
    radius: t.radius,
    attackTimer: 0, flyPhase: Math.random() * Math.PI * 2,
    status: { burn: 0, burnDps: 0, freeze: 0, slow: 0, slowFactor: 1, poison: 0, poisonDps: 0, launched: false },
    alive: true,
  };
  e.mesh.position.copy(pos);
  scene.add(e.mesh);
  enemies.push(e);
  drawHpBar(e);
  return e;
}

// speedFactor: statuses (freeze/slow) computed fully in the effects section
function enemySpeedFactor(e) {
  if (e.status.freeze > 0) return 0;
  let f = 1;
  if (e.status.slow > 0) f *= e.status.slowFactor;
  return f;
}

function updateEnemy(e, dt) {
  const toPlayer = new THREE.Vector3().subVectors(player.pos, e.pos);
  toPlayer.y = 0;
  const dist = toPlayer.length();
  toPlayer.normalize();
  const sf = enemySpeedFactor(e);
  e.attackTimer -= dt;

  if (e.status.freeze > 0 || e.status.launched) {
    // frozen: no AI. launched: vertical physics handled by effects section
  } else if (e.type === 'flyer') {
    e.flyPhase += dt * 3;
    const strafe = new THREE.Vector3(-toPlayer.z, 0, toPlayer.x).multiplyScalar(Math.sin(e.flyPhase) * 0.7);
    e.vel.copy(toPlayer).add(strafe).normalize().multiplyScalar(e.speed * sf);
    e.pos.addScaledVector(e.vel, dt);
    e.pos.y = 2 + Math.sin(e.flyPhase * 0.7 + e.flyPhase) * 1.2 + 1.5;
    const trueDist = e.pos.distanceTo(new THREE.Vector3(player.pos.x, player.pos.y + 1, player.pos.z));
    if (trueDist < e.radius + player.radius + 0.6 && e.attackTimer <= 0) {
      damagePlayer(e.def.ram);
      e.attackTimer = e.def.ramRate;
    }
  } else if (e.type === 'spitter') {
    let move = 0;
    if (dist < e.def.keepMin) move = -1;
    else if (dist > e.def.keepMax) move = 1;
    e.vel.x = toPlayer.x * move * e.speed * sf;
    e.vel.z = toPlayer.z * move * e.speed * sf;
    e.vel.y += GRAVITY * dt;
    moveWithCollision(e.pos, e.vel, e.radius, 1.8, dt);
    if (e.attackTimer <= 0 && dist < 40) {
      e.attackTimer = e.def.shotRate;
      const origin = e.pos.clone().add(new THREE.Vector3(0, 1.3, 0));
      const aim = new THREE.Vector3(player.pos.x, player.pos.y + 1.2, player.pos.z).sub(origin).normalize();
      spawnProjectile(SPELLS[0], origin, aim, { hostile: true, damage: e.def.shot, speed: 22, color: 0x6aff4a, scale: 1.4 });
    }
  } else { // grunt, tank — melee chase
    e.vel.x = toPlayer.x * e.speed * sf;
    e.vel.z = toPlayer.z * e.speed * sf;
    e.vel.y += GRAVITY * dt;
    moveWithCollision(e.pos, e.vel, e.radius, e.type === 'tank' ? 2.4 : 1.8, dt);
    if (dist < e.def.meleeRange && e.attackTimer <= 0 && Math.abs(e.pos.y - player.pos.y) < 2) {
      damagePlayer(e.def.melee);
      e.attackTimer = e.def.meleeRate;
    }
  }

  e.mesh.position.copy(e.pos);
  e.mesh.userData.body.rotation.y += dt * (e.type === 'flyer' ? 4 : 1.2);
  e.mesh.userData.hpBar.bar.material.opacity = e.hp < e.maxHp ? 1 : 0;
}

function damageEnemy(e, amount, source) {
  if (!e.alive) return;
  e.hp -= amount;
  drawHpBar(e);
  spawnDamageNumber(e.pos.clone().add(new THREE.Vector3(0, e.type === 'tank' ? 2.6 : 2, 0)),
    Math.round(amount), source && source.color !== undefined ? source.color : 0xffffff);
  onEnemyHitFeedback();
  if (e.hp <= 0) killEnemy(e, source);
}

function killEnemy(e, source) {
  if (!e.alive) return;
  e.alive = false;
  G.kills++;
  G.score += e.def.score * G.wave;
  onEnemyDeathFeedback(e, source);
  scene.remove(e.mesh);
}

// VFX hooks — replaced with real effects in the VFX section
function onEnemyHitFeedback() {}
function onEnemyDeathFeedback(e, source) {}

// ===== Floating damage numbers =====
const dmgNumbers = [];
function spawnDamageNumber(pos, amount, color) {
  let n = dmgNumbers.find(n => !n.alive);
  if (!n) {
    if (dmgNumbers.length > 40) return;
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 48;
    const tex = new THREE.CanvasTexture(cv);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
    sprite.scale.set(1.8, 0.68, 1);
    scene.add(sprite);
    n = { sprite, cv, tex, age: 0, alive: false };
    dmgNumbers.push(n);
  }
  const ctx = n.cv.getContext('2d');
  ctx.clearRect(0, 0, 128, 48);
  ctx.font = 'bold 30px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.strokeText(amount, 64, 34);
  ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  ctx.fillText(amount, 64, 34);
  n.tex.needsUpdate = true;
  n.sprite.position.copy(pos);
  n.sprite.position.x += (Math.random() - 0.5) * 0.6;
  n.sprite.visible = true;
  n.sprite.material.opacity = 1;
  n.age = 0; n.alive = true;
}

function updateDamageNumbers(dt) {
  for (const n of dmgNumbers) {
    if (!n.alive) continue;
    n.age += dt;
    n.sprite.position.y += dt * 1.7;
    n.sprite.material.opacity = 1 - n.age / 0.7;
    if (n.age > 0.7) { n.alive = false; n.sprite.visible = false; }
  }
}

// ===== Wave director =====
const portals = [];
const spawnQueue = [];
let waveClearTimer = 0;

function buildPortals() {
  const half = arena.size / 2;
  const spots = [[0, -half + 2], [0, half - 2], [-half + 2, 0], [half - 2, 0]];
  for (const [x, z] of spots) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.14, 8, 24),
      new THREE.MeshBasicMaterial({ color: 0xa06bff }));
    ring.position.set(x, 2, z);
    ring.lookAt(0, 2, 0);
    scene.add(ring);
    portals.push({ x, z, ring });
  }
}

function waveComposition(n) {
  const total = 4 + 2 * n;
  const list = [];
  for (let i = 0; i < total; i++) {
    const pool = Object.keys(ENEMY_TYPES).filter(t => ENEMY_TYPES[t].firstWave <= n);
    // weight later waves toward tougher picks
    const pick = pool[Math.min(pool.length - 1, Math.floor(Math.random() * pool.length + (n >= 6 ? 0.4 : 0)))];
    list.push(pick);
  }
  return list;
}

function spawnWave(n) {
  G.wave = n;
  showWaveBanner(n);
  const comp = waveComposition(n);
  comp.forEach((type, i) => {
    spawnQueue.push({ type, at: i * 0.5 });
  });
}

function showWaveBanner(n) {
  const el = document.getElementById('wave-banner');
  if (!el) { console.log('WAVE', n); return; }
  el.textContent = `WAVE ${n}`;
  el.classList.remove('show');
  void el.offsetWidth; // restart animation
  el.classList.add('show');
}

function updateWaves(dt) {
  for (const p of portals) p.ring.rotation.z += dt * 1.5;

  for (let i = spawnQueue.length - 1; i >= 0; i--) {
    spawnQueue[i].at -= dt;
    if (spawnQueue[i].at <= 0) {
      if (enemies.filter(e => e.alive).length < 30) {
        const portal = portals[Math.floor(Math.random() * portals.length)];
        spawnEnemy(spawnQueue[i].type, new THREE.Vector3(portal.x, 0, portal.z));
      }
      spawnQueue.splice(i, 1);
    }
  }

  if (spawnQueue.length === 0 && !enemies.some(e => e.alive)) {
    waveClearTimer += dt;
    if (waveClearTimer >= 3) {
      waveClearTimer = 0;
      spawnWave(G.wave + 1);
    }
  } else {
    waveClearTimer = 0;
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }
    updateEnemy(e, dt);
  }
}

function update(dt) {
  updatePlayer(dt);
  tryShoot(dt);
  updateProjectiles(dt);
  updateEnemies(dt);
  updateWaves(dt);
  updateDamageNumbers(dt);
  updateHUD();
}

function updateHUD() {
  const hp = document.getElementById('hp-fill');
  if (hp) hp.style.width = (player.hp / player.maxHp * 100) + '%';
  const hpText = document.getElementById('hp-text');
  if (hpText) hpText.textContent = Math.ceil(player.hp);
  const wi = document.getElementById('wave-info');
  wi.innerHTML = `<b>WAVE ${G.wave}</b> &nbsp;·&nbsp; ☠ ${G.kills} &nbsp;·&nbsp; ★ ${G.score}`;
}

function render() {
  renderer.render(scene, camera);
}

function boot() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0716);
  scene.fog = new THREE.Fog(0x0b0716, 60, 140);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 300);
  camera.rotation.order = 'YXZ';
  camera.position.set(0, 1.7, 0);

  buildArena();
  buildLights();
  buildPortals();

  document.body.addEventListener('click', () => {
    if (G.state === 'menu' || G.state === 'paused') requestPlay();
  });

  selectSpell(0);

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  let last = performance.now();
  (function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    if (G.state === 'playing') update(dt);
    render();
  })(performance.now());
}

window.addEventListener('DOMContentLoaded', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('no-internet').style.display = 'flex';
    return;
  }
  boot();
});
</script>
