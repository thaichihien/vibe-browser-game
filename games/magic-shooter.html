<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Shooter</title>
<style>
  :root {
    --magic: #a06bff;
    --hp: #ff3b5c;
    --ui-bg: rgba(10, 8, 20, 0.72);
    --ui-border: rgba(160, 107, 255, 0.35);
    --text: #e8e2ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0716; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); user-select: none; }
  canvas { display: block; }

  .overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(ellipse at center, rgba(20,12,40,0.88) 0%, rgba(5,3,12,0.96) 100%);
    z-index: 20;
  }
  #no-internet { z-index: 30; text-align: center; }
  #no-internet h2 { color: var(--magic); margin-bottom: 12px; }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
  #crosshair {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 14px; height: 14px; border: 2px solid var(--magic); border-radius: 50%;
    box-shadow: 0 0 8px var(--magic);
  }
  #health-bar { position: absolute; left: 24px; bottom: 96px; }
  #wave-info { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); text-align: center; }
  #hotbar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
</style>
</head>
<body>
<div id="hud">
  <div id="crosshair"></div>
  <div id="health-bar"></div>
  <div id="wave-info"></div>
  <div id="hotbar"></div>
</div>

<div id="start-screen" class="overlay"></div>
<div id="pause-screen" class="overlay"></div>
<div id="gameover-screen" class="overlay"></div>
<div id="spell-grid" class="overlay"></div>
<div id="no-internet" class="overlay">
  <h2>⚡ Magic Shooter needs an internet connection</h2>
  <p>The 3D engine (Three.js) could not be loaded. Check your connection and reload the page.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ===== Game namespace & globals =====
const G = {
  state: 'menu', // 'menu' | 'playing' | 'paused' | 'gameover'
  wave: 0, kills: 0, score: 0,
  spellIndex: 0,
};
let scene, camera, renderer;
const arena = { size: 80, wallHeight: 12, colliders: [] };

// ===== Arena =====
const MATS = {};
function buildMaterials() {
  MATS.floor  = new THREE.MeshStandardMaterial({ color: 0x14101f, roughness: 0.9, metalness: 0.15 });
  MATS.wall   = new THREE.MeshStandardMaterial({ color: 0x1c1430, roughness: 0.85 });
  MATS.pillar = new THREE.MeshStandardMaterial({ color: 0x241a3e, roughness: 0.7, emissive: 0x150a30 });
  MATS.block  = new THREE.MeshStandardMaterial({ color: 0x2a1f4a, roughness: 0.75, emissive: 0x0c0620 });
  MATS.trimCyan    = new THREE.MeshBasicMaterial({ color: 0x2ee6ff });
  MATS.trimMagenta = new THREE.MeshBasicMaterial({ color: 0xff2ee6 });
}

// Adds a box mesh centered at (x, y+h/2, z) and registers its AABB collider.
function addBox(x, y, z, w, h, d, mat, noCollide) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y + h / 2, z);
  scene.add(mesh);
  if (!noCollide) {
    arena.colliders.push({
      min: new THREE.Vector3(x - w / 2, y, z - d / 2),
      max: new THREE.Vector3(x + w / 2, y + h, z + d / 2),
    });
  }
  return mesh;
}

function buildArena() {
  buildMaterials();
  const S = arena.size, H = arena.wallHeight, half = S / 2;

  // Floor + grid
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(S, S), MATS.floor);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  const grid = new THREE.GridHelper(S, 40, 0x4a2a8a, 0x2a1a4a);
  grid.position.y = 0.02;
  scene.add(grid);

  // Outer walls (thickness 2, just outside the play area)
  addBox(0, 0, -half - 1, S + 4, H, 2, MATS.wall);
  addBox(0, 0,  half + 1, S + 4, H, 2, MATS.wall);
  addBox(-half - 1, 0, 0, 2, H, S + 4, MATS.wall);
  addBox( half + 1, 0, 0, 2, H, S + 4, MATS.wall);

  // Neon trim strips along wall bases
  const trims = [
    [0, -half + 0.05, S, 0.25, 0.3, MATS.trimCyan],
    [0,  half - 0.05, S, 0.25, 0.3, MATS.trimMagenta],
  ];
  for (const [x, z, w, h, d, m] of trims) {
    addBox(x, 0, z, w, h, d, m, true);
    addBox(z, 0, x, d, h, w, m === MATS.trimCyan ? MATS.trimMagenta : MATS.trimCyan, true);
  }

  // Pillars (6)
  const pillarSpots = [[-24, -24], [24, -24], [-24, 24], [24, 24], [0, -30], [0, 30]];
  for (const [x, z] of pillarSpots) {
    addBox(x, 0, z, 3, H - 2, 3, MATS.pillar);
    addBox(x, H - 2, z, 3.6, 0.4, 3.6, MATS.trimCyan, true);
  }

  // Jumpable blocks (heights 1.5 -> 4, chained near center-east)
  const blocks = [
    [10, 4, 1.5], [15, 8, 2.2], [20, 12, 3.0], [25, 16, 4.0],
    [-12, -8, 1.5], [-18, -14, 2.5], [-8, 14, 2.0], [14, -18, 3.2],
  ];
  for (const [x, z, h] of blocks) addBox(x, 0, z, 4, h, 4, MATS.block);

  // Ramps: stepped thin boxes rising to height 3 (AABB-friendly stairs)
  buildRamp(-30, 0, 1, 0);   // rises east
  buildRamp(30, 8, -1, 0);   // rises west
}

function buildRamp(x, z, dirX, dirZ) {
  const steps = 5, stepH = 0.6, stepLen = 1.6;
  for (let i = 0; i < steps; i++) {
    addBox(x + dirX * i * stepLen, 0, z + dirZ * i * stepLen,
      dirX ? stepLen : 4, stepH * (i + 1), dirZ ? stepLen : 4, MATS.block);
  }
}

function buildLights() {
  scene.add(new THREE.AmbientLight(0x332244, 1.2));
  scene.add(new THREE.HemisphereLight(0x5a3aa0, 0x120a24, 0.8));
  const lightSpots = [
    [-24, -24, 0x2ee6ff], [24, 24, 0xff2ee6], [0, 0, 0xa06bff],
  ];
  for (const [x, z, c] of lightSpots) {
    const l = new THREE.PointLight(c, 0.9, 55);
    l.position.set(x, arena.wallHeight - 2, z);
    scene.add(l);
  }
}

// ===== Input =====
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });

// ===== Player =====
const player = {
  pos: new THREE.Vector3(0, 0, 20),
  vel: new THREE.Vector3(),
  yaw: Math.PI, pitch: 0,
  onGround: false,
  hp: 100, maxHp: 100,
  radius: 0.5, height: 1.7,
};

const LOOK_SENS = 0.0022;
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== renderer.domElement) return;
  player.yaw -= e.movementX * LOOK_SENS;
  player.pitch -= e.movementY * LOOK_SENS;
  const lim = Math.PI / 2 - 0.02;
  player.pitch = Math.max(-lim, Math.min(lim, player.pitch));
});

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) {
    G.state = 'playing';
    for (const id of ['start-screen', 'pause-screen', 'spell-grid'])
      document.getElementById(id).style.display = 'none';
    document.getElementById('hud').style.display = 'block';
  } else if (G.state === 'playing') {
    pauseGame();
  }
});

function requestPlay() {
  if (G.state === 'gameover') return; // restart handled by UI
  renderer.domElement.requestPointerLock();
}

function pauseGame() {
  G.state = 'paused';
  document.getElementById('pause-screen').style.display = 'flex';
}

// Resolves movement against arena colliders one axis at a time.
// Shared by the player and ground enemies. Returns { onGround }.
function moveWithCollision(pos, vel, radius, height, dt) {
  let onGround = false;
  const half = arena.size / 2 - radius;

  // X axis
  pos.x += vel.x * dt;
  pos.x = Math.max(-half, Math.min(half, pos.x));
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      pos.x = vel.x > 0 ? c.min.x - radius : c.max.x + radius;
    }
  }
  // Z axis
  pos.z += vel.z * dt;
  pos.z = Math.max(-half, Math.min(half, pos.z));
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      pos.z = vel.z > 0 ? c.min.z - radius : c.max.z + radius;
    }
  }
  // Y axis
  pos.y += vel.y * dt;
  if (pos.y <= 0) { pos.y = 0; vel.y = 0; onGround = true; }
  for (const c of arena.colliders) {
    if (overlaps(pos, radius, height, c)) {
      if (vel.y <= 0 && pos.y >= c.max.y - 1.0) {
        pos.y = c.max.y; vel.y = 0; onGround = true;   // land on top
      } else if (vel.y > 0) {
        pos.y = c.min.y - height; vel.y = 0;           // bump head
      } else {
        // walked into a side while falling: push out along shallowest axis
        const pushX = pos.x < (c.min.x + c.max.x) / 2 ? c.min.x - radius : c.max.x + radius;
        const pushZ = pos.z < (c.min.z + c.max.z) / 2 ? c.min.z - radius : c.max.z + radius;
        if (Math.abs(pushX - pos.x) < Math.abs(pushZ - pos.z)) pos.x = pushX; else pos.z = pushZ;
      }
    }
  }
  return { onGround };
}

function overlaps(pos, radius, height, c) {
  return pos.x + radius > c.min.x && pos.x - radius < c.max.x &&
         pos.z + radius > c.min.z && pos.z - radius < c.max.z &&
         pos.y < c.max.y && pos.y + height > c.min.y;
}

const GRAVITY = -28, WALK = 8, SPRINT = 12, JUMP_V = 10.5, AIR_CONTROL = 0.35;

function updatePlayer(dt) {
  const fwd = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0);
  const strafe = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
  const speed = keys.ShiftLeft ? SPRINT : WALK;

  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  let wx = (-sin * fwd + cos * strafe);
  let wz = (-cos * fwd - sin * strafe);
  const len = Math.hypot(wx, wz) || 1;
  wx = wx / len * speed; wz = wz / len * speed;

  const ctrl = player.onGround ? 1 : AIR_CONTROL;
  player.vel.x += (wx - player.vel.x) * Math.min(1, dt * 14 * ctrl);
  player.vel.z += (wz - player.vel.z) * Math.min(1, dt * 14 * ctrl);

  if (keys.Space && player.onGround) { player.vel.y = JUMP_V; player.onGround = false; }
  player.vel.y += GRAVITY * dt;

  const res = moveWithCollision(player.pos, player.vel, player.radius, player.height, dt);
  player.onGround = res.onGround;

  camera.position.set(player.pos.x, player.pos.y + player.height, player.pos.z);
  camera.rotation.set(player.pitch, player.yaw, 0);
}

function damagePlayer(amount) {
  if (G.state !== 'playing') return;
  player.hp = Math.max(0, player.hp - amount);
  if (player.hp <= 0) gameOver();
}

function gameOver() {
  G.state = 'gameover';
  document.exitPointerLock();
  console.log('GAME OVER — wave', G.wave, 'kills', G.kills, 'score', G.score);
}

function update(dt) {
  updatePlayer(dt);
}

function render() {
  renderer.render(scene, camera);
}

function boot() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0716);
  scene.fog = new THREE.Fog(0x0b0716, 60, 140);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 300);
  camera.rotation.order = 'YXZ';
  camera.position.set(0, 1.7, 0);

  buildArena();
  buildLights();

  document.body.addEventListener('click', () => {
    if (G.state === 'menu' || G.state === 'paused') requestPlay();
  });

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  let last = performance.now();
  (function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    if (G.state === 'playing') update(dt);
    render();
  })(performance.now());
}

window.addEventListener('DOMContentLoaded', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('no-internet').style.display = 'flex';
    return;
  }
  boot();
});
</script>
</body>
</html>
