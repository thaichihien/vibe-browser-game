<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Farmer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
  :root {
    --accent: #6ee7a0;
    --money: #ffd76a;
    --hp: #ff5c6a;
    --ui-bg: rgba(8, 12, 20, .78);
    --ui-border: rgba(110, 231, 160, .35);
    --text: #e8f5ec;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0f1e; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); user-select: none; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ===== Overlays (hidden by default) ===== */
  .overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(ellipse at center, rgba(10, 20, 16, 0.88) 0%, rgba(3, 6, 10, 0.96) 100%);
    z-index: 20; text-align: center;
  }
  #start-screen { display: flex; } /* game boots into G.state === 'menu' */
  #no-internet { z-index: 30; }
  #no-internet h2 { color: var(--accent); margin-bottom: 12px; }

  .overlay h1, .overlay h2 { color: var(--accent); text-shadow: 0 0 18px var(--accent); letter-spacing: 4px; margin-bottom: 16px; }

  /* ===== HUD skeleton ===== */
  #hud {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
  }
  #money, #hp-bar, #day-info, #seed-bar {
    position: absolute; pointer-events: none;
    background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 8px;
  }
  #money { top: 14px; left: 14px; padding: 6px 14px; color: var(--money); font-weight: 600; }
  #hp-bar { top: 14px; right: 14px; padding: 6px 10px; width: 170px; }
  #day-info { top: 14px; left: 50%; transform: translateX(-50%); padding: 6px 14px; }
  #seed-bar { bottom: 14px; left: 50%; transform: translateX(-50%); padding: 6px 14px; }

  /* ===== HP bar fill ===== */
  .hp-track { position: relative; width: 100%; height: 14px; background: rgba(255, 255, 255, 0.08); border-radius: 4px; overflow: hidden; }
  .hp-fill { height: 100%; background: var(--hp); transition: width 0.2s ease; }
  .hp-label { font-size: 11px; text-align: center; margin-top: 3px; color: var(--hp); }

  /* ===== Shop panel ===== */
  #shop-panel { pointer-events: auto; }
  #shop-panel .shop-box {
    width: min(640px, 92vw); max-height: 82vh; display: flex; flex-direction: column;
    background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 12px;
    overflow: hidden; pointer-events: auto;
  }
  .shop-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--ui-border); }
  .shop-header h2 { margin: 0; }
  .shop-close-btn {
    background: none; border: 1px solid var(--ui-border); color: var(--text); border-radius: 6px;
    width: 28px; height: 28px; cursor: pointer; font-size: 14px; pointer-events: auto;
  }
  .shop-close-btn:hover { background: rgba(255, 255, 255, 0.08); }
  .shop-tabs { display: flex; border-bottom: 1px solid var(--ui-border); }
  .shop-tab {
    flex: 1; padding: 10px 4px; background: none; border: none; color: var(--text); opacity: 0.6;
    cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; pointer-events: auto;
  }
  .shop-tab.active { opacity: 1; border-bottom-color: var(--accent); color: var(--accent); }
  .shop-tab:hover { opacity: 0.9; }
  .shop-body { padding: 14px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; text-align: left; }
  .shop-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(255, 255, 255, 0.04); border-radius: 8px; }
  .shop-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .shop-name { flex: 1; font-size: 14px; }
  .shop-desc { font-size: 11px; opacity: 0.6; display: block; }
  .shop-meta { font-size: 12px; opacity: 0.85; min-width: 64px; text-align: right; }
  .shop-buy-btn, .shop-sell-btn {
    background: rgba(110, 231, 160, 0.15); border: 1px solid var(--ui-border); color: var(--accent);
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; pointer-events: auto;
  }
  .shop-buy-btn:hover:not(:disabled), .shop-sell-btn:hover:not(:disabled) { background: rgba(110, 231, 160, 0.3); }
  .shop-buy-btn:disabled, .shop-sell-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .shop-owned { color: var(--accent); font-size: 13px; font-weight: bold; }
  .shop-locked { opacity: 0.45; font-size: 12px; }
  .shop-row-later { opacity: 0.55; }
  .shop-total-banner { margin-top: 4px; padding: 10px; text-align: center; font-size: 14px; color: var(--money); border-top: 1px solid var(--ui-border); }
  #toast {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  #banner {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; font-size: 28px; letter-spacing: 3px; color: var(--accent);
  }

  /* ===== Farming HUD: seed bar + toast ===== */
  #seed-bar { display: flex; gap: 6px; pointer-events: auto; padding: 8px; }
  .seed-cell {
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 46px; height: 46px; border-radius: 6px; cursor: pointer;
    background: rgba(255, 255, 255, 0.06); border: 1px solid transparent; pointer-events: auto;
  }
  .seed-cell .seed-key { position: absolute; top: 2px; left: 4px; font-size: 9px; opacity: 0.6; }
  .seed-cell .seed-icon { font-size: 20px; line-height: 1; }
  .seed-cell .seed-count { font-size: 11px; color: var(--text); }
  .seed-cell.selected { border-color: var(--accent); background: rgba(110, 231, 160, 0.18); }
  .seed-cell.locked { opacity: 0.35; }
  #toast {
    padding: 6px 14px; border-radius: 8px; background: var(--ui-bg); border: 1px solid var(--ui-border);
    opacity: 0; transition: opacity 0.3s ease; font-size: 14px;
  }

  /* ===== Launch cinematic: fullscreen white fade before the victory reveal ===== */
  #launch-fade {
    position: fixed; inset: 0; background: #ffffff; opacity: 0;
    pointer-events: none; z-index: 25;
  }

  /* ===== Victory screen ===== */
  .victory-stats { font-size: 16px; line-height: 1.8; margin-bottom: 22px; }
  .victory-btn {
    background: rgba(110, 231, 160, 0.15); border: 1px solid var(--ui-border); color: var(--accent);
    padding: 10px 26px; border-radius: 8px; cursor: pointer; font-size: 15px; pointer-events: auto;
  }
  .victory-btn:hover { background: rgba(110, 231, 160, 0.3); }
</style>
</head>
<body>

<div id="start-screen" class="overlay">
  <h1>GALAXY FARMER</h1>
</div>
<div id="pause-screen" class="overlay">
  <h2>PAUSED</h2>
</div>
<div id="help-panel" class="overlay">
  <h2>HELP</h2>
</div>
<div id="victory-screen" class="overlay">
  <h2>YOU BUILT THE SPACESHIP!</h2>
  <div id="victory-stats" class="victory-stats"></div>
  <button id="victory-replay-btn" class="victory-btn" type="button">Play Again</button>
</div>
<div id="downed-screen" class="overlay">
  <h2>DOWNED</h2>
</div>
<div id="shop-panel" class="overlay">
  <div class="shop-box">
    <div class="shop-header">
      <h2>SHOP</h2>
      <button id="shop-close-btn" class="shop-close-btn" type="button">✕</button>
    </div>
    <div class="shop-tabs">
      <button class="shop-tab" data-tab="seeds" type="button">🌱 Seeds</button>
      <button class="shop-tab" data-tab="sell" type="button">🪙 Sell</button>
      <button class="shop-tab" data-tab="upgrades" type="button">⬆️ Upgrades</button>
      <button class="shop-tab" data-tab="spaceship" type="button">🚀 Spaceship</button>
    </div>
    <div id="shop-body" class="shop-body"></div>
  </div>
</div>
<div id="no-internet" class="overlay">
  <h2>🚀 Galaxy Farmer needs an internet connection</h2>
  <p>The 3D engine (Three.js) could not be loaded. Check your connection and reload the page.</p>
</div>

<div id="hud">
  <div id="money"></div>
  <div id="hp-bar"></div>
  <div id="day-info"></div>
  <div id="seed-bar"></div>
  <div id="toast"></div>
  <div id="banner"></div>
</div>
<div id="launch-fade"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ===== Game namespace & globals =====
const G = {}; // G.state: 'menu' | 'playing' | 'shop' | 'paused' | 'downed' | 'launch' | 'victory'
let scene, camera, renderer;
const PLANET_R = 14;

// ===== World: planet, decorations, house, launch pad, lighting, starfield =====
let world, sunLight, moonLight, ambient, houseLamp, houseWindowMat, starfield;

const _Y = new THREE.Vector3(0, 1, 0);
function placeOnSurface(obj, dir, yaw = 0, height = 0) {
  const d = dir.clone().normalize();
  obj.position.copy(d).multiplyScalar(PLANET_R + height);
  obj.quaternion.setFromUnitVectors(_Y, d);
  obj.rotateY(yaw);
}

function randomSurfaceDir() {
  const v = new THREE.Vector3(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
  if (v.lengthSq() < 1e-6) v.set(0, 1, 0);
  return v.normalize();
}

// Shared geometries/materials for scattered decorations (rocks/trees).
const rockGeo = new THREE.DodecahedronGeometry(1, 0);
const rockMat = new THREE.MeshLambertMaterial({ color: 0x8c8c8c });
const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1, 6);
const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4a2f });
const leafGeo = new THREE.ConeGeometry(0.7, 1.2, 8);
const leafMat = new THREE.MeshLambertMaterial({ color: 0x2f7a3f });

function buildPlanet() {
  const geo = new THREE.IcosahedronGeometry(PLANET_R, 4);
  const posAttr = geo.attributes.position;
  const count = posAttr.count;
  const colors = new Float32Array(count * 3);
  const grass = new THREE.Color(0x4a9e5c);
  const dirt = new THREE.Color(0x8a6a4a);
  const v = new THREE.Vector3();
  const c = new THREE.Color();
  for (let i = 0; i < count; i++) {
    v.set(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)).normalize();
    c.copy(v.dot(world.houseDir) > 0.88 ? dirt : grass);
    c.offsetHSL(0, 0, (Math.random() - 0.5) * 0.12);
    colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshLambertMaterial({ vertexColors: true });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  return mesh;
}

function inExclusionZone(dir) {
  // Keep decorations off the farm patch around the house and off the landing pad.
  return dir.dot(world.houseDir) > 0.86 || dir.dot(world.padDir) > 0.93;
}

function buildDecorations() {
  for (let i = 0; i < 10; i++) {
    let dir;
    do { dir = randomSurfaceDir(); } while (inExclusionZone(dir));
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const s = 0.3 + Math.random() * 0.6;
    rock.scale.setScalar(s);
    placeOnSurface(rock, dir, Math.random() * Math.PI * 2, s * 0.35);
    scene.add(rock);
  }
  for (let i = 0; i < 7; i++) {
    let dir;
    do { dir = randomSurfaceDir(); } while (inExclusionZone(dir));
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.5;
    tree.add(trunk);
    const leaf1 = new THREE.Mesh(leafGeo, leafMat);
    leaf1.position.y = 1.3;
    tree.add(leaf1);
    const leaf2 = new THREE.Mesh(leafGeo, leafMat);
    leaf2.position.y = 1.85;
    leaf2.scale.setScalar(0.7);
    tree.add(leaf2);
    placeOnSurface(tree, dir, Math.random() * Math.PI * 2);
    scene.add(tree);
  }
}

function buildHouse() {
  const houseGroup = new THREE.Group();
  placeOnSurface(houseGroup, world.houseDir, 0, 0);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(3, 2.5, 3),
    new THREE.MeshLambertMaterial({ color: 0xd2b48c }) // warm tan
  );
  body.position.y = 1.25;
  houseGroup.add(body);

  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(2.5, 1.4, 4), // 4-sided cone = pyramid roof
    new THREE.MeshLambertMaterial({ color: 0xb33f32 }) // rust red
  );
  roof.position.y = 2.5 + 0.7;
  roof.rotation.y = Math.PI / 4; // align pyramid faces to the box sides
  houseGroup.add(roof);

  // Door on the local +Z face (the side facing the farm region).
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 1.6),
    new THREE.MeshLambertMaterial({ color: 0x3a2a1a })
  );
  door.position.set(0, 0.8, 1.51);
  door.userData.pick = { kind: 'door' };
  houseGroup.add(door);
  world.doorMesh = door;

  houseWindowMat = new THREE.MeshLambertMaterial({ color: 0xfff2b0, emissive: 0xffdd66, emissiveIntensity: 0 });
  const windowGeo = new THREE.PlaneGeometry(0.7, 0.7);
  const win1 = new THREE.Mesh(windowGeo, houseWindowMat);
  win1.position.set(1.51, 1.5, 0.6);
  win1.rotation.y = Math.PI / 2;
  houseGroup.add(win1);
  const win2 = new THREE.Mesh(windowGeo, houseWindowMat);
  win2.position.set(-1.51, 1.5, 0.6);
  win2.rotation.y = -Math.PI / 2;
  houseGroup.add(win2);

  scene.add(houseGroup);

  // Door dir: house dir nudged toward the farm center (the tangent the door opens onto).
  const doorTangent = new THREE.Vector3(0, 0, 1).applyQuaternion(houseGroup.quaternion).normalize();
  world.houseDoorDir = world.houseDir.clone().addScaledVector(doorTangent, 0.12).normalize();
}

function buildPad() {
  const padGroup = new THREE.Group();
  const pad = new THREE.Mesh(
    new THREE.CylinderGeometry(3.5, 3.5, 0.3, 24),
    new THREE.MeshLambertMaterial({ color: 0x565c63 })
  );
  pad.position.y = 0.15;
  padGroup.add(pad);

  const lightGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xffaa33 });
  [[2.3, 2.3], [2.3, -2.3], [-2.3, 2.3], [-2.3, -2.3]].forEach(([x, z]) => {
    const l = new THREE.Mesh(lightGeo, lightMat);
    l.position.set(x, 0.35, z);
    padGroup.add(l);
  });

  placeOnSurface(padGroup, world.padDir, 0, 0);
  scene.add(padGroup);
}

function buildLighting() {
  sunLight = new THREE.DirectionalLight(0xfff2d8, 1.1);
  sunLight.position.set(60, 40, 30);
  sunLight.target.position.set(0, 0, 0);
  scene.add(sunLight, sunLight.target);

  moonLight = new THREE.DirectionalLight(0x8899ff, 0.25);
  moonLight.position.set(-60, 40, -30);
  moonLight.target.position.set(0, 0, 0);
  moonLight.intensity = 0; // off during the day; Task 9 fades it in at night
  scene.add(moonLight, moonLight.target);

  ambient = new THREE.AmbientLight(0x445566, 0.7);
  scene.add(ambient);

  houseLamp = new THREE.PointLight(0xffc76a, 0, 8);
  houseLamp.position.copy(world.houseDoorDir).multiplyScalar(PLANET_R + 1.2);
  scene.add(houseLamp);
}

function buildStarfield() {
  const starCount = 800;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(starCount * 3);
  const R = 300;
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 2 - 1);
    positions[i * 3] = R * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = R * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = R * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.4, sizeAttenuation: true, transparent: true, opacity: 1 });
  starfield = new THREE.Points(geo, mat);
  scene.add(starfield);
}

function buildWorld() {
  world = {
    houseDir: new THREE.Vector3(0, 0.35, 1).normalize(),
    padDir: new THREE.Vector3(0, 0.2, -1).normalize(),
  };
  world.planet = buildPlanet();
  buildDecorations();
  buildHouse();
  buildPad();
  buildLighting();
  buildStarfield();
}

// ===== Player: mesh, local frame, surface movement =====
let player;
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _q1 = new THREE.Quaternion();
function playerUp(out)      { return out.set(0, 1, 0).applyQuaternion(player.q); }
function playerForward(out) { return out.set(0, 0, 1).applyQuaternion(player.q); }

function buildPlayerMesh() {
  const group = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.35, 0.9, 12),
    new THREE.MeshLambertMaterial({ color: 0xffffff })
  );
  body.position.y = 0.9;
  group.add(body);

  const helmet = new THREE.Mesh(
    new THREE.SphereGeometry(0.32, 16, 12),
    new THREE.MeshPhongMaterial({ color: 0xaee0ff, transparent: true, opacity: 0.75, shininess: 90 })
  );
  helmet.position.y = 1.5;
  group.add(helmet);

  const backpack = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 0.45, 0.2),
    new THREE.MeshLambertMaterial({ color: 0xdd8833 })
  );
  backpack.position.set(0, 0.95, -0.3);
  group.add(backpack);

  const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.55, 8);
  const legMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
  const legL = new THREE.Mesh(legGeo, legMat);
  legL.position.set(-0.15, 0.275, 0);
  group.add(legL);
  const legR = new THREE.Mesh(legGeo, legMat);
  legR.position.set(0.15, 0.275, 0);
  group.add(legR);

  return group;
}

function movePlayerToDir(dir) {
  player.q.setFromUnitVectors(_Y, _v1.copy(dir).normalize());
  player.pos.set(0, 1, 0).applyQuaternion(player.q).multiplyScalar(PLANET_R);
  player.mesh.position.copy(player.pos);
  player.mesh.quaternion.copy(player.q);
}

function buildPlayer() {
  player = {
    q: new THREE.Quaternion(),
    pos: new THREE.Vector3(),
    mesh: buildPlayerMesh(),
    hp: 100,
    maxHp: 100,
    speed: 6,
    lastHurt: 0,
  };
  player.q.setFromUnitVectors(_Y, world.houseDoorDir);
  // Rotate slightly around the local up axis so the spawn facing isn't the raw
  // minimal-rotation twist (purely aesthetic framing for the initial view).
  player.q.premultiply(_q1.setFromAxisAngle(playerUp(_v1), 0.3));
  scene.add(player.mesh);
}

const TURN_SPEED = 2.6; // rad/s
let _walkT = 0;
function updatePlayer(dt) {
  if (G.state !== 'playing') return; // don't move the player while the shop panel is open
  const turn = (keys.KeyD || keys.ArrowRight ? 1 : 0) - (keys.KeyA || keys.ArrowLeft ? 1 : 0);
  const fwd  = (keys.KeyW || keys.ArrowUp ? 1 : 0) - (keys.KeyS || keys.ArrowDown ? 1 : 0);
  if (turn) player.q.premultiply(_q1.setFromAxisAngle(playerUp(_v1), -turn * TURN_SPEED * dt));
  if (fwd) {
    const right = _v1.set(1, 0, 0).applyQuaternion(player.q);
    player.q.premultiply(_q1.setFromAxisAngle(right, fwd * (player.speed * dt) / PLANET_R));
  }
  player.pos.set(0, 1, 0).applyQuaternion(player.q).multiplyScalar(PLANET_R);
  player.mesh.position.copy(player.pos);
  player.mesh.quaternion.copy(player.q);

  // Simple walk-cycle bob while moving.
  if (fwd || turn) {
    _walkT += dt;
    const bob = 0.06 * Math.sin(_walkT * 10);
    player.mesh.position.addScaledVector(playerUp(_v2), bob);
  }
}

function stepOnSphere(q, targetDir, speed, dt) { // shared with alien walkers
  const up = _v1.set(0, 1, 0).applyQuaternion(q);
  const axis = _v2.crossVectors(up, targetDir);
  if (axis.lengthSq() < 1e-8) return;
  axis.normalize();
  const step = Math.min(speed * dt / PLANET_R, up.angleTo(targetDir));
  q.premultiply(_q1.setFromAxisAngle(axis, step));
}

// ===== Camera: third-person follow + right-drag orbit =====
const cam = { yaw: 0, pitch: 0.35, dragging: false };
const CAM_DIST = 7, CAM_HEIGHT = 3.2;
function updateCamera(dt) {
  // Reuses module-scope _v1 (up) / _v2 (fwd -> offset -> ideal) instead of the
  // brief's per-frame `new THREE.Vector3()` / `.clone()` calls, per the 60fps
  // "reuse temp vectors" constraint; math is otherwise identical to the brief.
  const up = playerUp(_v1);
  const fwd = playerForward(_v2);
  fwd.multiplyScalar(-CAM_DIST).addScaledVector(up, CAM_HEIGHT + CAM_DIST * cam.pitch);
  fwd.applyAxisAngle(up, cam.yaw); // fwd is now the camera offset
  fwd.add(player.pos); // fwd is now the ideal camera position
  camera.position.lerp(fwd, 1 - Math.pow(0.0001, dt));
  camera.up.copy(up);
  up.multiplyScalar(1.5).add(player.pos); // up is now the lookAt target
  camera.lookAt(up);

  if (!cam.dragging && cam.yaw !== 0) {
    const ease = 3 * dt; // rad/s back to 0
    if (Math.abs(cam.yaw) <= ease) cam.yaw = 0;
    else cam.yaw -= Math.sign(cam.yaw) * ease;
  }
}

// ===== Input: keyboard movement map + right-drag orbit =====
const keys = {};
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  keys[e.code] = true;
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

window.addEventListener('contextmenu', (e) => e.preventDefault());
window.addEventListener('mousedown', (e) => {
  if (e.button === 2) cam.dragging = true;
});
window.addEventListener('mouseup', (e) => {
  if (e.button === 2) cam.dragging = false;

const plotSoilGeo = new THREE.BoxGeometry(1.6, 0.25, 1.6);
const untilledSoilMat = new THREE.MeshLambertMaterial({ color: 0x5a8a4a });
const drySoilMat = new THREE.MeshLambertMaterial({ color: 0xa8845a });
const wetSoilMat = new THREE.MeshLambertMaterial({ color: 0x6a4a30 });

function makeRingGeometry(radius, segments) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0.02, Math.sin(a) * radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  geo.computeLineDistances(); // harmless for the LineBasicMaterial ring; required for the dashed one
  return geo;
}
const plotRingGeo = makeRingGeometry(0.9, 24);
const lockedRingMat = new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.35 });
const untilledRingMat = new THREE.LineDashedMaterial({ color: 0x9fe89f, transparent: true, opacity: 0.6, dashSize: 0.15, gapSize: 0.12 });

function makeIconTexture(char, color) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = '46px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color || '#ffffff';
  ctx.fillText(char, 32, 34);
  return new THREE.CanvasTexture(canvas);
}
const plusSpriteMat = new THREE.SpriteMaterial({ map: makeIconTexture('+', '#eaffea'), transparent: true, depthTest: false });
const waterSpriteMat = new THREE.SpriteMaterial({ map: makeIconTexture('💧'), transparent: true, depthTest: false });

const sproutGeo = new THREE.ConeGeometry(0.15, 0.4, 6);
const midConeGeo = new THREE.ConeGeometry(0.18, 0.6, 6);
const budGeo = new THREE.SphereGeometry(0.16, 8, 8);
const readyGeo = new THREE.SphereGeometry(0.3, 10, 10);
const sproutMat = new THREE.MeshLambertMaterial({ color: 0x4a9e5c });
// Two material sets per crop (module-scope singletons, shared across plots):
// cropMats for mid-stage buds (constant, no glow) and readyMats for the ready stage
// only — updatePlots pulses emissiveIntensity on readyMats exclusively, so growing
// crops never inherit the harvest-ready glow.
const cropMats = {};
const readyMats = {};
SEED_ORDER.forEach((id) => {
  cropMats[id] = new THREE.MeshLambertMaterial({ color: CROPS[id].color });
  readyMats[id] = new THREE.MeshLambertMaterial({ color: CROPS[id].color, emissive: CROPS[id].color, emissiveIntensity: 0.4 });
});

let plots = [];
let pickables = [];
const _raycaster = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
let _plotPulseT = 0;

// 12 plot dirs in a 4x3 fan around world.houseDir, spreading toward world.houseDoorDir.
// Each row sits at a constant geodesic (surface) distance from houseDir so the whole fan
// stays inside the dirt patch (dot > 0.88) regardless of lateral spread; lateral column
// spacing is compensated by the row's circle-of-latitude size (PLANET_R*sin(theta)) so
// columns land ~2.6u apart at every row, not just the nearest one. The first row starts
// at 3.2u so plot boxes (half 0.8) clear the 3x3 house footprint (half 1.5). Each plot
// also gets a deterministic orientation: the house tangent frame parallel-transported
// along the geodesic to the plot (quat = rotation(axis, theta) * houseQuat), so all
// soil boxes are mutually near-axis-aligned and rows/columns read as a tidy field.
// Verified with a standalone node SAT box-overlap script (see task-4 report): all dots
// > 0.88 (min 0.8843), min house-plot gap 0.643u, min plot-plot gap 0.236u.
function computePlotLayout() {
  const houseDir = world.houseDir;
  const qHouse = new THREE.Quaternion().setFromUnitVectors(_Y, houseDir);
  const tangentF = world.houseDoorDir.clone()
    .addScaledVector(houseDir, -world.houseDoorDir.dot(houseDir))
    .normalize();
  const tangentR = new THREE.Vector3().crossVectors(houseDir, tangentF).normalize();

  const ROW_RADII = [3.2, 5.0, 6.8]; // surface distance from house center; max stays < 6.93 (dot=0.88 boundary)
  const COLS = 4;
  const SPACING = 2.6; // target lateral surface distance between adjacent columns

  const layout = [];
  for (const R of ROW_RADII) {
    const theta = R / PLANET_R;
    const F = PLANET_R * Math.sin(theta);
    for (let c = 0; c < COLS; c++) {
      const Lc = (c - (COLS - 1) / 2) * SPACING;
      const ang = Lc / F;
      const offsetDir = tangentF.clone().multiplyScalar(Math.cos(ang)).addScaledVector(tangentR, Math.sin(ang)).normalize();
      const axis = new THREE.Vector3().crossVectors(houseDir, offsetDir).normalize();
      const dir = houseDir.clone().applyAxisAngle(axis, theta).normalize();
      const quat = new THREE.Quaternion().setFromAxisAngle(axis, theta).multiply(qHouse);
      layout.push({ dir, quat });
    }
  }
  return layout;
}

function buildPlotGroup(plot, quat) {
  const group = new THREE.Group();
  // Deterministic orientation (parallel-transported house frame) — a random yaw here
  // could rotate diagonal corners of adjacent soil boxes into each other.
  group.position.copy(plot.dir).multiplyScalar(PLANET_R);
  group.quaternion.copy(quat);

  const soil = new THREE.Mesh(plotSoilGeo, drySoilMat);
  soil.position.y = 0.125;
  group.add(soil);

  const lockedRing = new THREE.LineLoop(plotRingGeo, lockedRingMat);
  group.add(lockedRing);
  const untilledRing = new THREE.LineLoop(plotRingGeo, untilledRingMat);
  group.add(untilledRing);

  const plusSprite = new THREE.Sprite(plusSpriteMat);
  plusSprite.scale.set(0.5, 0.5, 1);
  plusSprite.position.y = 0.6;
  group.add(plusSprite);

  const waterSprite = new THREE.Sprite(waterSpriteMat);
  waterSprite.scale.set(0.4, 0.4, 1);
  waterSprite.position.y = 0.9;
  group.add(waterSprite);

  const sprout = new THREE.Mesh(sproutGeo, sproutMat);
  sprout.position.y = 0.25 + 0.2;
  group.add(sprout);

  const mid = new THREE.Group();
  mid.position.y = 0.25;
  const midCone = new THREE.Mesh(midConeGeo, sproutMat);
  midCone.position.y = 0.3;
  mid.add(midCone);
  const midBud = new THREE.Mesh(budGeo, cropMats.wheat); // reassigned to the real crop material on sow
  midBud.position.y = 0.55;
  mid.add(midBud);
  group.add(mid);

  const ready = new THREE.Mesh(readyGeo, readyMats.wheat); // reassigned to the real crop material on sow
  ready.position.y = 0.25 + 0.3;
  group.add(ready);

  group.userData.pick = { kind: 'plot', ref: plot };
  scene.add(group);

  plot._meshes = { soil, lockedRing, untilledRing, plusSprite, waterSprite, sprout, mid, midBud, ready };
  return group;
}

function assignCropVisual(plot) {
  plot._meshes.midBud.material = cropMats[plot.cropId];
  plot._meshes.ready.material = readyMats[plot.cropId];
  plot._meshes.ready.scale.setScalar(CROP_SCALE[plot.cropId] || 1);
}

// Recomputes which stage mesh should be visible from state/growth/watered; only ever
// toggles .visible/.material references (no geometry rebuilds, no per-call allocations).
function updatePlotVisual(plot) {
  const m = plot._meshes;
  const locked = plot.state === 'locked';
  const untilled = plot.state === 'untilled';

  m.lockedRing.visible = locked;
  m.untilledRing.visible = untilled;
  m.plusSprite.visible = untilled;
  m.soil.visible = !locked;
  if (!locked) {
    m.soil.material = untilled ? untilledSoilMat : (plot.watered ? wetSoilMat : drySoilMat);
  }

  let stage = null;
  if (plot.state === 'growing') stage = plot.growth < 0.4 ? 'sprout' : 'mid';
  else if (plot.state === 'ready') stage = 'ready';
  m.sprout.visible = stage === 'sprout';
  m.mid.visible = stage === 'mid';
  m.ready.visible = stage === 'ready';

  m.waterSprite.visible = plot.state === 'growing' && !plot.watered;
}

function buildPlots() {
  const layout = computePlotLayout();
  for (let i = 0; i < layout.length; i++) {
    const plot = {
      dir: layout[i].dir,
      state: i < 4 ? 'untilled' : 'locked',
      cropId: null,
      growth: 0,
      watered: false,
      redried: false,
      group: null,
    };
    plot.group = buildPlotGroup(plot, layout[i].quat);
    updatePlotVisual(plot);
    plots.push(plot);
    pickables.push(plot.group);
  }
}

function updatePlots(dt) {
  _plotPulseT += dt;
  const pulse = 0.4 + 0.3 * Math.sin(_plotPulseT * 3); // ready-stage-only emissive pulse
  for (let i = 0; i < SEED_ORDER.length; i++) readyMats[SEED_ORDER[i]].emissiveIntensity = pulse;

  for (let i = 0; i < plots.length; i++) {
    const plot = plots[i];
    if (G.upgrades.sprinkler && plot.state === 'growing' && !plot.watered) plot.watered = true;
    if (plot.state === 'growing' && plot.watered) {
      plot.growth += dt / CROPS[plot.cropId].growTime;
      if (plot.growth >= 0.5 && !plot.redried) {
        plot.watered = false;
        plot.redried = true; // needs one more watering
      }
      if (plot.growth >= 1) {
        plot.growth = 1;
        plot.state = 'ready';
      }
    }
    updatePlotVisual(plot);
  }
}

function interactPlot(plot) {
  switch (plot.state) {
    case 'locked':
      toast('Buy Field Expansion at the house');
      break;
    case 'untilled':
      if (spend(TILL_COST)) plot.state = 'empty'; // small dirt burst (visual polish deferred to a later juice pass)
      break;
    case 'empty':
      if (inventory.seeds[G.selectedSeed] > 0) {
        inventory.seeds[G.selectedSeed]--;
        plot.cropId = G.selectedSeed;
        plot.state = 'growing';
        plot.growth = 0;
        plot.watered = false;
        plot.redried = false;
        assignCropVisual(plot);
        updateSeedBar();
      } else {
        toast('No ' + CROPS[G.selectedSeed].name + ' seeds — buy at the house');
      }
      break;
    case 'growing':
      if (!plot.watered) plot.watered = true; // soil darkens next updatePlotVisual pass
      else toast('Growing…');
      break;
    case 'ready':
      inventory.produce[plot.cropId]++; // harvest touches produce only; seed bar unaffected
      G.stats.harvests++;
      plot.state = 'empty';
      plot.cropId = null;
      plot.growth = 0;
      plot.watered = false;
      plot.redried = false;
      break;
  }
}

// ===== Shop: open/close, tabs, buy actions =====
function doorDistance() {
  return playerUp(_v1).angleTo(world.houseDoorDir) * PLANET_R;
}

function openShop() {
  G.state = 'shop';
  document.getElementById('shop-panel').style.display = 'flex';
  renderShopTab(G.shopTab);
}

function closeShop() {
  G.state = 'playing';
  document.getElementById('shop-panel').style.display = 'none';
}

function tryOpenShopDoor() {
  if (doorDistance() > DOOR_RANGE) toast('Walk to the house door');
  else openShop();
}

function renderShopTab(tab) {
  G.shopTab = tab;
  document.querySelectorAll('.shop-tab').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const body = document.getElementById('shop-body');
  body.innerHTML = '';
  if (tab === 'seeds') renderSeedsTab(body);
  else if (tab === 'sell') renderSellTab(body);
  else if (tab === 'upgrades') renderUpgradesTab(body);
  else if (tab === 'spaceship') renderSpaceshipTab(body);
}

function renderSeedsTab(body) {
  SEED_ORDER.forEach((id) => {
    const crop = CROPS[id];
    const afford = G.money >= crop.seedCost;
    const row = document.createElement('div');
    row.className = 'shop-row';
    row.innerHTML =
      '<span class="shop-icon">' + crop.icon + '</span>' +
      '<span class="shop-name">' + crop.name + '<span class="shop-desc">' + crop.growTime + 's grow · sells ' + crop.sellPrice + ' 🪙</span></span>' +
      '<span class="shop-meta">you have ' + inventory.seeds[id] + '</span>' +
      '<button class="shop-buy-btn"' + (afford ? '' : ' disabled') + '>Buy ' + crop.seedCost + ' 🪙</button>';
    row.querySelector('button').addEventListener('click', () => buySeed(id));
    body.appendChild(row);
  });
}

function buySeed(id) {
  const crop = CROPS[id];
  if (!spend(crop.seedCost)) return;
  inventory.seeds[id]++;
  updateSeedBar();
  renderShopTab('seeds');
}

function renderSellTab(body) {
  let total = 0;
  SEED_ORDER.forEach((id) => {
    const crop = CROPS[id];
    const count = inventory.produce[id];
    total += count * crop.sellPrice;
    const row = document.createElement('div');
    row.className = 'shop-row';
    row.innerHTML =
      '<span class="shop-icon">' + crop.icon + '</span>' +
      '<span class="shop-name">' + crop.name + '<span class="shop-desc">' + crop.sellPrice + ' 🪙 each</span></span>' +
      '<span class="shop-meta">x' + count + '</span>' +
      '<button class="shop-sell-btn" data-n="1"' + (count > 0 ? '' : ' disabled') + '>Sell 1</button>' +
      '<button class="shop-sell-btn" data-n="all"' + (count > 0 ? '' : ' disabled') + '>Sell All</button>';
    const buttons = row.querySelectorAll('button');
    buttons[0].addEventListener('click', () => sellProduce(id, 1));
    buttons[1].addEventListener('click', () => sellProduce(id, inventory.produce[id]));
    body.appendChild(row);
  });
  const banner = document.createElement('div');
  banner.className = 'shop-total-banner';
  banner.textContent = 'Inventory value: ' + total + ' 🪙';
  body.appendChild(banner);
}

function sellProduce(id, n) {
  if (n <= 0 || inventory.produce[id] < n) return;
  inventory.produce[id] -= n;
  earn(CROPS[id].sellPrice * n);
  renderShopTab('sell');
}

function renderUpgradesTab(body) {
  UPGRADES.forEach((u) => {
    const isBool = u.id === 'sprinkler';
    const level = isBool ? (G.upgrades.sprinkler ? 1 : 0) : G.upgrades[u.id];
    const maxLevel = u.levels.length;
    const maxed = level >= maxLevel;
    const nextCost = maxed ? null : u.levels[level];
    const afford = !maxed && G.money >= nextCost;
    const row = document.createElement('div');
    row.className = 'shop-row';
    row.innerHTML =
      '<span class="shop-icon">' + u.icon + '</span>' +
      '<span class="shop-name">' + u.name + '<span class="shop-desc">' + u.desc + '</span></span>' +
      '<span class="shop-meta">Lv ' + level + '/' + maxLevel + '</span>' +
      '<button class="shop-buy-btn"' + (maxed || !afford ? ' disabled' : '') + '>' + (maxed ? 'MAX' : nextCost + ' 🪙') + '</button>';
    if (!maxed) row.querySelector('button').addEventListener('click', () => buyUpgrade(u.id));
    body.appendChild(row);
  });
}

function buyUpgrade(id) {
  const u = UPGRADES.find((x) => x.id === id);
  const isBool = id === 'sprinkler';
  const level = isBool ? (G.upgrades.sprinkler ? 1 : 0) : G.upgrades[id];
  if (level >= u.levels.length) return;
  if (!spend(u.levels[level])) return;
  if (isBool) {
    G.upgrades.sprinkler = true;
  } else {
    G.upgrades[id]++;
    if (id === 'boots') player.speed = [6, 7.5, 9][G.upgrades.boots];
    else if (id === 'field') applyFieldExpansion(G.upgrades.field);
  }
  renderShopTab('upgrades');
}

function applyFieldExpansion(level) {
  // Level 1 unlocks plots[4..7] ("plots 5-8"); level 2 unlocks plots[8..11] ("plots 9-12").
  const start = level === 1 ? 4 : 8;
  for (let i = start; i < start + 4 && i < plots.length; i++) {
    if (plots[i].state === 'locked') {
      plots[i].state = 'untilled';
      updatePlotVisual(plots[i]);
    }
  }
}

function renderSpaceshipTab(body) {
  SHIP_PARTS.forEach((part, i) => {
    const row = document.createElement('div');
    row.className = 'shop-row' + (i > G.partsOwned ? ' shop-row-later' : '');
    let statusHtml;
    if (i < G.partsOwned) {
      statusHtml = '<span class="shop-owned">✓ Owned</span>';
    } else if (i === G.partsOwned) {
      const afford = G.money >= part.cost;
      statusHtml = '<button class="shop-buy-btn"' + (afford ? '' : ' disabled') + '>Buy ' + part.cost + ' 🪙</button>';
    } else {
      statusHtml = '<span class="shop-locked">Requires previous part</span>';
    }
    row.innerHTML =
      '<span class="shop-icon">' + part.icon + '</span>' +
      '<span class="shop-name">' + part.name + '</span>' +
      statusHtml;
    if (i === G.partsOwned) {
      const btn = row.querySelector('button');
      if (btn) btn.addEventListener('click', buyPart);
    }
    body.appendChild(row);
  });
}

function buyPart() {
  const idx = G.partsOwned;
  if (idx >= SHIP_PARTS.length) return;
  if (!spend(SHIP_PARTS[idx].cost)) return;
  G.partsOwned++;
  updateShipVisual();
  if (G.partsOwned >= SHIP_PARTS.length) {
    closeShop();
    startLaunchSequence();
  } else {
    renderShopTab('spaceship');
  }
}

const GHOST_MAT = new THREE.MeshBasicMaterial({ wireframe: true, transparent: true, opacity: 0.35, color: 0x6ee7a0 });
let shipGroup;
let shipParts = [];       // Group per SHIP_PARTS index, built once at boot
let engineRingMat;        // shared emissive material on the 5 engine rings (ramped during launch)
let exhaustMesh;          // single scaling exhaust cone, not part of the owned/ghost progression
let navLightMesh;         // nav module's blinking light (toggled by elapsed launch time)
// Launch-only temps (assigned once in startLaunchSequence, read every frame in updateLaunch —

const _launchTangentA = new THREE.Vector3();
const _launchTangentB = new THREE.Vector3();
const _launchCamTarget = new THREE.Vector3();

function addPartMesh(group, mesh) {
  mesh.userData.origMat = mesh.material; // remembered so ghost mode can be swapped back to 'solid'
  group.add(mesh);
  return mesh;
}

function buildFrame() {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2, 8, 1, true), bodyMat);
  body.position.y = 1;
  addPartMesh(g, body);
  const strutMat = new THREE.MeshLambertMaterial({ color: 0x777777 });
  const strutGeo = new THREE.CylinderGeometry(0.05, 0.05, 2, 4);
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const strut = new THREE.Mesh(strutGeo, strutMat);
    strut.position.set(Math.cos(a) * 1.2, 1, Math.sin(a) * 1.2);
    addPartMesh(g, strut);
  }
  const ringGeo = new THREE.TorusGeometry(1.2, 0.04, 6, 16);
  [0.4, 1.6].forEach((y) => {
    const ring = new THREE.Mesh(ringGeo, strutMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = y;
    addPartMesh(g, ring);
  });
  return g; // lattice-look gray cylinder, 1.2r x 2h, base at local y=0.7 once added to shipGroup
}

function buildEngine() {
  const g = new THREE.Group();
  const coneMat = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
  const coneGeo = new THREE.ConeGeometry(0.32, 0.8, 10);
  const offsets = [[0, 0], [0.6, 0.6], [0.6, -0.6], [-0.6, 0.6], [-0.6, -0.6]];
  offsets.forEach(([x, z]) => {
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.set(x, 0.4, z);
    cone.rotation.x = Math.PI; // nozzle opening faces down, toward the pad
    addPartMesh(g, cone);
  });
  engineRingMat = new THREE.MeshLambertMaterial({ color: 0xff6a2a, emissive: 0xff6a2a, emissiveIntensity: 0.4 });
  const ringGeo = new THREE.TorusGeometry(0.32, 0.05, 6, 12);
  offsets.forEach(([x, z]) => {
    const ring = new THREE.Mesh(ringGeo, engineRingMat);
    ring.position.set(x, 0.15, z);
    addPartMesh(g, ring);
  });
  return g; // dark cone cluster + orange emissive rings, sits below the frame
}

function buildFuelTank() {
  const g = new THREE.Group();
  const tankMat = new THREE.MeshLambertMaterial({ color: 0xb5502a });
  const tankGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 10);
  [1.35, -1.35].forEach((x) => {
    const tank = new THREE.Mesh(tankGeo, tankMat);
    tank.position.set(x, 1.1, 0);
    addPartMesh(g, tank);
  });
  return g; // two rust-orange side cylinders flanking the frame
}

function buildCockpit() {
  const g = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({ color: 0xaee0ff, transparent: true, opacity: 0.8, shininess: 90 });
  const dome = new THREE.Mesh(new THREE.SphereGeometry(0.85, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2), mat);
  dome.position.y = 2;
  addPartMesh(g, dome);
  return g; // light-blue glass sphere-cap on top of the frame
}

function buildNavigation() {
  const g = new THREE.Group();
  const dishMat = new THREE.MeshLambertMaterial({ color: 0xdddddd, side: THREE.DoubleSide });
  const dish = new THREE.Mesh(new THREE.CircleGeometry(0.3, 12), dishMat);
  dish.position.set(0.5, 2.55, 0);
  dish.rotation.y = Math.PI / 2;
  addPartMesh(g, dish);
  const antennaMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
  const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6, 6), antennaMat);
  antenna.position.set(0, 2.75, 0);
  addPartMesh(g, antenna);
  const navLightMat = new THREE.MeshLambertMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 1 });
  navLightMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), navLightMat);
  navLightMesh.position.set(0, 3.05, 0);
  addPartMesh(g, navLightMesh);
  return g; // small dish + antenna + blinking red light, topmost part
}

function buildShip() {
  shipGroup = new THREE.Group();
  placeOnSurface(shipGroup, world.padDir, 0, 0.3); // ship sits on the pad, pad top is at height ~0.3
  scene.add(shipGroup);

  shipParts = [buildFrame(), buildEngine(), buildFuelTank(), buildCockpit(), buildNavigation()];
  shipParts.forEach((g) => shipGroup.add(g));

  // Exhaust: a single scaling emissive cone (Task 9's particle system doesn't exist yet, per
  // the brief). Not part of the ghost/owned progression -- hidden until launch starts.
  const exhaustMat = new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.7 });
  exhaustMesh = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.2, 10), exhaustMat);
  exhaustMesh.position.y = -0.2;
  exhaustMesh.rotation.x = Math.PI;
  exhaustMesh.visible = false;
  shipGroup.add(exhaustMesh);

  updateShipVisual();
}

function setPartMode(group, mode) { // 'solid' | 'ghost' | 'hidden'
  group.visible = mode !== 'hidden';
  if (mode === 'hidden') return;
  group.traverse((obj) => {
    if (obj.isMesh) obj.material = mode === 'ghost' ? GHOST_MAT : obj.userData.origMat;
  });
}

function updateShipVisual() {
  for (let i = 0; i < shipParts.length; i++) {
    const mode = i < G.partsOwned ? 'solid' : (i === G.partsOwned ? 'ghost' : 'hidden');
    setPartMode(shipParts[i], mode);
  }
}

function startLaunchSequence() {
  G.state = 'launch'; // player input & updateCamera stop: the main loop only calls update(dt)
                       // for 'playing'/'shop', so this state drives itself from render()'s hook
  G.launchT = 0;
  document.getElementById('hud').style.display = 'none';

  exhaustMesh.visible = true;
  exhaustMesh.scale.set(0.01, 0.01, 0.01);

  const fade = document.getElementById('launch-fade');
  fade.style.transition = 'none';
  fade.style.opacity = '0';

  // Tangent basis perpendicular to padDir, used both to frame the side-view camera and for
  // the liftoff wobble. Computed once here (not per frame).
  _launchTangentA.set(0, 1, 0).cross(world.padDir);
  if (_launchTangentA.lengthSq() < 1e-6) _launchTangentA.set(1, 0, 0).cross(world.padDir);
  _launchTangentA.normalize();
  _launchTangentB.crossVectors(world.padDir, _launchTangentA).normalize();

  const padPos = _v1.copy(world.padDir).multiplyScalar(PLANET_R + 0.3);
  _launchCamTarget.copy(padPos)
    .addScaledVector(_launchTangentA, 11)
    .addScaledVector(world.padDir, 6);
}

// Drives the ~8s launch cinematic; called from render() each frame while G.state === 'launch'.
// camera.up stays pinned to world.padDir throughout since updateCamera never runs in this state.
function updateLaunch(dt) {
  G.launchT += dt;
  const t = G.launchT;

  camera.position.lerp(_launchCamTarget, 1 - Math.pow(0.0008, dt));
  camera.up.copy(world.padDir);
  camera.lookAt(shipGroup.position);

  // Engine glow + exhaust ramp over the first 2s, then hold steady.
  const glow = Math.min(t / 2, 1);
  engineRingMat.emissiveIntensity = 0.4 + glow * 1.8;
  exhaustMesh.scale.set(1, 0.4 + glow * 2.2, 1);
  exhaustMesh.material.opacity = 0.3 + glow * 0.5;

  // Liftoff: ship eases outward along padDir starting at t=1s, with tangential wobble that
  // decays as it climbs.
  const liftT = Math.max(0, t - 1);
  const liftFrac = Math.min(liftT / 6, 1);
  const dist = liftFrac * liftFrac * 34;
  const wobbleDecay = Math.max(0, 1 - liftFrac);
  _v1.copy(world.padDir).multiplyScalar(PLANET_R + 0.3 + dist);
  _v1.addScaledVector(_launchTangentA, Math.sin(t * 5) * 0.12 * wobbleDecay);
  _v1.addScaledVector(_launchTangentB, Math.cos(t * 4) * 0.08 * wobbleDecay);
  shipGroup.position.copy(_v1);

  // Blinking nav light, driven purely by elapsed launch time (allocation-free).
  navLightMesh.visible = Math.floor(t / 0.35) % 2 === 0;

  // Fade to white over the last 2s, then reveal the victory screen.
  if (t >= 6) {
    const fadeT = Math.min((t - 6) / 2, 1);
    document.getElementById('launch-fade').style.opacity = String(fadeT);
  }
  if (t >= LAUNCH_DURATION) showVictory();
}

function showVictory() {
  G.state = 'victory';
  const fade = document.getElementById('launch-fade');
  fade.style.transition = 'opacity 1s ease';
  fade.style.opacity = '0'; // white flash eases back out, revealing the victory overlay beneath

  document.getElementById('victory-stats').innerHTML =
    'Days survived: ' + (G.day || 1) + '<br>' +
    'Total money earned: ' + G.stats.earned + ' 🪙<br>' +
    'Aliens defeated: ' + G.stats.kills + '<br>' +
    'Harvests: ' + G.stats.harvests;

  document.getElementById('victory-screen').style.display = 'flex';
}

function setupShopUI() {
  document.getElementById('shop-close-btn').addEventListener('click', closeShop);
  document.querySelectorAll('.shop-tab').forEach((btn) => {
    btn.addEventListener('click', () => renderShopTab(btn.dataset.tab));
  });
}

function setupVictoryUI() {
  document.getElementById('victory-replay-btn').addEventListener('click', () => {
    location.reload(); // Task 10 replaces with resetGame()
  });
}

// ----- Picking: raycast mouse -> plot / door / planet('space') -----
function pickWorld(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  _ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  _ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  _raycaster.setFromCamera(_ndc, camera);
  const hits = _raycaster.intersectObjects(pickables, true);
  if (hits.length === 0) return { kind: 'space', ref: null, point: null };
  const point = hits[0].point;
  let obj = hits[0].object;
  while (obj) {
    const pick = obj.userData.pick;
    if (pick) {
      if (pick.kind === 'space') return { kind: 'space', ref: null, point };
      return { kind: pick.kind, ref: pick.ref !== undefined ? pick.ref : obj, point };
    }
    obj = obj.parent;
  }
  return { kind: 'space', ref: null, point };
}

window.addEventListener('mousedown', (e) => {
  if (e.button !== 0 || G.state !== 'playing' || cam.dragging) return;
  const hit = pickWorld(e);
  switch (hit.kind) {
    case 'plot': {
      const plot = hit.ref;
      const dist = playerUp(_v1).angleTo(plot.dir) * PLANET_R;
      if (dist > PLOT_RANGE) toast('Walk closer to the plot');
      else interactPlot(plot);
      break;
    }
    case 'door':
      tryOpenShopDoor();
      break;
    case 'enemy':
      // Task 7: enemy hit/target logic.
      break;
    case 'star':
      // Task 9: star/launch interaction.
      break;
    case 'space':
    default:
      // Task 7: shooting handles clicks on open space.
      break;
  }
});

window.addEventListener('keydown', (e) => {
  if (e.repeat || G.state !== 'playing') return;
  const idx = SEED_HOTKEYS.indexOf(e.code);
  if (idx !== -1) {
    G.selectedSeed = SEED_ORDER[idx];
    updateSeedBar();
  }
  if (e.code === 'KeyE') tryOpenShopDoor();
});

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Escape' && G.state === 'shop') closeShop();
});

function boot() {
  G.state = 'menu';
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.prepend(renderer.domElement);
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0f1e);
  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, PLANET_R + 8, PLANET_R + 14);
  camera.lookAt(0, PLANET_R, 0);
  buildWorld();
  buildPlayer();
  world.planet.userData.pick = { kind: 'space' };
  pickables.push(world.planet, world.doorMesh);
  buildPlots();
  buildShip();
  updateHUD();
  updateSeedBar();
  setupShopUI();
  setupVictoryUI();
  G.state = 'playing'; // TEMP: until Task 10 start screen
  let last = performance.now();
  (function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - last) / 1000, 0.05); last = now;
    if (G.state === 'playing' || G.state === 'shop') update(dt);
    render(dt);
  })(performance.now());
}

// Populated by later tasks (crops, enemies, ship, etc.).
function update(dt) {
  updatePlayer(dt);
  updateCamera(dt);
  updatePlots(dt);
}

// Launch is driven from here (rather than a gate in update()/the loop) since it needs to run
// every frame while G.state === 'launch', a state the loop deliberately excludes from update()
// so player input and updateCamera stay frozen during the cinematic.
function render(dt) {
  if (G.state === 'launch') updateLaunch(dt);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if (!renderer || !camera) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

window.addEventListener('DOMContentLoaded', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('no-internet').style.display = 'flex';
    return; // boot() never runs
  }
  boot();
});
</script>
