// ----- Teleport-in flash: small pool of transient additive sprites (raid spawns can burst
// several aliens on the same frame, so a single shared instance wouldn't show them all). -----
const teleportFlashMat = new THREE.SpriteMaterial({ map: makeGlowTexture('rgba(120,255,160,1)'), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
let teleportFlashes = [];
function spawnTeleportFlash(pos) {
  const sprite = new THREE.Sprite(teleportFlashMat.clone());
  sprite.position.copy(pos);
  sprite.scale.set(0.1, 0.1, 1);
  scene.add(sprite);
  teleportFlashes.push({ sprite, t: 0 });
}
function updateTeleportFlashes(dt) {
  for (let i = teleportFlashes.length - 1; i >= 0; i--) {
    const f = teleportFlashes[i];
    f.t += dt;
    const p = Math.min(f.t / 0.4, 1);
    f.sprite.scale.set(0.1 + p * 1.4, 0.1 + p * 1.4, 1);
    f.sprite.material.opacity = 1 - p;
    if (p >= 1) {
      scene.remove(f.sprite);
      teleportFlashes.splice(i, 1);
    }
  }
}

// ----- Spawning -----
function randomSpawnDir() {
  const playerDir = new THREE.Vector3();
  playerUp(playerDir);
  let dir, tries = 0;
  do { dir = randomSurfaceDir(); tries++; } while (dir.angleTo(playerDir) < Math.PI / 4 && tries < 30);
  return dir;
}

function spawnAlien(typeId, dir) {
  const def = ALIENS[typeId];
  const spawnDir = (dir || randomSpawnDir()).clone().normalize();
  const hp = Math.round(def.hp * (1 + 0.15 * G.partsOwned));
  const alien = {
    type: typeId, def, hp, maxHp: hp, alive: true,
    radius: def.radius, pos: new THREE.Vector3(),
    mesh: buildAlienMesh(typeId),
    state: 'walk', atkT: 0, flashT: 0, flashMats: [],
    fromRaid: false,
  };
  if (def.alt) {
    alien.dir = spawnDir.clone();
    alien.alt = def.alt;
  } else {
    alien.q = new THREE.Quaternion().setFromUnitVectors(_Y, spawnDir);
  }
  if (typeId === 'hopper') { alien.hopDir = new THREE.Vector3(); alien.hopT = 0; alien.state = 'pause'; }
  else if (typeId === 'raider') { alien.targetPlot = null; alien.carrying = null; }
  else if (typeId === 'spitter') { alien.atkT = 2.5; }
  else if (typeId === 'brute') { alien.targetPlot = null; alien.windupT = 0; }
  else if (typeId === 'summoner') { alien.spawnT = 6; alien.minions = []; }
  else if (typeId === 'ufo') { alien.targetPlot = null; alien.beamT = 0; alien.state = 'seek'; }

  tagFlashable(alien);

  alien.hpSprite = makeHealthBarSprite();
  alien.hpSprite.position.y = def.hbY;
  alien.mesh.add(alien.hpSprite);
  redrawHealthBar(alien);

  const worldPos = spawnDir.clone().multiplyScalar(PLANET_R + (def.alt || 0));
  alien.pos.copy(worldPos);
  alien.mesh.position.copy(worldPos);
  alien.mesh.quaternion.setFromUnitVectors(_Y, spawnDir);
  alien.mesh.userData.pick = { kind: 'enemy', ref: alien };

  scene.add(alien.mesh);
  pickables.push(alien.mesh);
  enemies.push(alien);
  spawnTeleportFlash(worldPos);
  return alien;
}

function spawnMinionNear(dir, fromRaid) {
  const offset = randomSurfaceDir();
  const axis = new THREE.Vector3().crossVectors(dir, offset);
  if (axis.lengthSq() < 1e-6) axis.set(1, 0, 0);
  axis.normalize();
  const spawnDir = dir.clone().applyAxisAngle(axis, (1 + Math.random() * 1.5) / PLANET_R);
  const g = spawnAlien('grunt', spawnDir);
  g.fromRaid = !!fromRaid;
  return g;
}

// ----- Death / removal -----
function removeAlienFromWorld(alien) {
  alien.alive = false;
  scene.remove(alien.mesh);
  const idx = pickables.indexOf(alien.mesh);
  if (idx !== -1) pickables.splice(idx, 1);
  const ei = enemies.indexOf(alien);
  if (ei !== -1) enemies.splice(ei, 1);
}
function killAlien(alien) {
  if (!alien.alive) return;
  dropCoins(alien.pos, alien.def.coins);
  if (alien.type === 'raider' && alien.carrying) {
    dropProducePickup(alien.pos, alien.carrying);
  }
  spawnHitSpark(alien.pos);
  G.stats.kills++;
  removeAlienFromWorld(alien);
}
function killAlienSilently(alien) { // raider escaped with its loot — no coins, no kill credit
  if (!alien.alive) return;
  removeAlienFromWorld(alien);
}

function damageEnemy(enemy, n, bulletVel) {
  if (!enemy.alive) return;
  if (enemy.type === 'shieldbearer' && bulletVel) {
    const fwd = _alienV1.set(0, 0, 1).applyQuaternion(enemy.mesh.quaternion).normalize();
    const bv = _alienV2.copy(bulletVel).normalize();
    if (bv.dot(fwd) < -0.5) { // frontal 120° arc: spark, no damage
      spawnHitSpark(enemy.pos);
      return;
    }
  }
  enemy.hp -= n;
  triggerFlash(enemy);
  redrawHealthBar(enemy);
  if (enemy.hp <= 0) killAlien(enemy);
}

// ----- Per-variant behavior -----
function updateGruntLike(alien, dt) { // grunt + shieldbearer: walk at player, melee in range
  const def = alien.def;
  const targetDir = playerUp(_alienV3);
  const up = alienUp(alien, _alienV1);
  const dist = up.angleTo(targetDir) * PLANET_R;
  const moveDir = dist > 1.5 ? targetDir : null;
  walkerTick(alien, def, moveDir, dt);
  tryMeleeAttack(alien, 1.5, def.dmg, 1.0, dt);
}

function updateHopper(alien, dt) {
  const def = alien.def;
  alien.hopT -= dt;
  if (alien.state === 'pause') {
    if (alien.hopT <= 0) {
      const targetDir = playerUp(_alienV3);
      const up = alienUp(alien, _alienV1);
      const zigzag = (Math.random() * 2 - 1) * (Math.PI * 40 / 180);
      alien.hopDir.copy(targetDir).applyAxisAngle(up, zigzag).normalize();
      alien.state = 'hop';
      alien.hopT = 0.4;
    }
    walkerTick(alien, def, null, dt);
  } else {
    walkerTick(alien, def, alien.hopDir, dt);
    if (alien.hopT <= 0) { alien.state = 'pause'; alien.hopT = 0.5; }
  }
  tryMeleeAttack(alien, 1.3, def.dmg, 1.0, dt);
}

function updateRaider(alien, dt) {
  const def = alien.def;
  if (alien.state === 'walk') {
    if (!alien.targetPlot) {
      const up = alienUp(alien, _alienV1);
      alien.targetPlot = nearestPlot(up, (p) => p.state === 'growing' || p.state === 'ready');
    }
    if (alien.targetPlot) {
      const up = alienUp(alien, _alienV1);
      const dist = up.angleTo(alien.targetPlot.dir) * PLANET_R;
      if (dist > 1.0) {
        walkerTick(alien, def, alien.targetPlot.dir, dt);
      } else {
        walkerTick(alien, def, null, dt);
        alien.state = 'grab';
        alien.grabT = 1.0;
      }
    } else {
      walkerTick(alien, def, null, dt); // nothing to steal right now
    }
  } else if (alien.state === 'grab') {
    walkerTick(alien, def, null, dt);
    alien.grabT -= dt;
    if (alien.grabT <= 0) {
      const plot = alien.targetPlot;
      if (plot && (plot.state === 'growing' || plot.state === 'ready')) {
        alien.carrying = plot.cropId;
        resetPlotToEmpty(plot);
      }
      alien.state = 'ascend';
      alien.ascendT = 0;
    }
  } else if (alien.state === 'ascend') {
    alien.ascendT += dt;
    const up = alienUp(alien, _alienV1);
    const h = Math.min(alien.ascendT / 3, 1) * 12;
    alien.pos.copy(up).multiplyScalar(PLANET_R + h);
    alien.mesh.position.copy(alien.pos);
    alien.mesh.quaternion.setFromUnitVectors(_Y, up);
    if (alien.ascendT >= 3) killAlienSilently(alien);
  }
}

function updateSpitter(alien, dt) {
  const def = alien.def;
  const up = alienUp(alien, _alienV1);
  const targetDir = playerUp(_alienV3);
  const dist = up.angleTo(targetDir) * PLANET_R;
  let moveDir = null;
  if (dist < 8) moveDir = _alienV2.copy(up).multiplyScalar(2).sub(targetDir).normalize(); // retreat
  else if (dist > 12) moveDir = targetDir; // close in
  walkerTick(alien, def, moveDir, dt);

  alien.atkT -= dt;
  if (alien.atkT <= 0) {
    const muzzle = _alienV3.copy(alienUp(alien, _alienV1)).multiplyScalar(0.9).add(alien.pos);
    const chest = playerUp(_alienV2).multiplyScalar(0.75).add(player.pos);
    spawnBullet(muzzle, chest, def.dmg, true);
    alien.atkT = 2.5;
  }
}

function updateBrute(alien, dt) {
  const def = alien.def;
  const up = alienUp(alien, _alienV1);
  const targetDir = playerUp(_alienV3);
  const distPlayer = up.angleTo(targetDir) * PLANET_R;

  if (distPlayer <= 2) {
    walkerTick(alien, def, null, dt);
    tryMeleeAttack(alien, 2, def.dmg, 1.2, dt);
    return;
  }

  if (alien.state === 'walk') {
    if (!alien.targetPlot) {
      alien.targetPlot = nearestPlot(up, (p) => p.state === 'growing' || p.state === 'ready');
    }
    if (alien.targetPlot) {
      const dist = up.angleTo(alien.targetPlot.dir) * PLANET_R;
      if (dist > 1.2) {
        walkerTick(alien, def, alien.targetPlot.dir, dt);
      } else {
        walkerTick(alien, def, null, dt);
        alien.state = 'windup';
        alien.windupT = 1.5;
      }
    } else {
      walkerTick(alien, def, null, dt);
    }
  } else if (alien.state === 'windup') {
    walkerTick(alien, def, null, dt);
    alien.windupT -= dt;
    if (alien.windupT <= 0) {
      const plot = alien.targetPlot;
      if (plot && (plot.state === 'growing' || plot.state === 'ready')) resetPlotToEmpty(plot);
      alien.targetPlot = null;
      alien.state = 'walk';
    }
  }
}

function updateSummoner(alien, dt) {
  const def = alien.def;
  stepDirTowards(alien.dir, world.houseDir, def.speed, dt);
  alien.pos.copy(alien.dir).multiplyScalar(PLANET_R + alien.alt);
  alien.mesh.position.copy(alien.pos);
  alien.mesh.quaternion.setFromUnitVectors(_Y, alien.dir);

  alien.spawnT -= dt;
  if (alien.spawnT <= 0) {
    alien.spawnT = 6;
    alien.minions = alien.minions.filter((m) => m.alive);
    if (alien.minions.length < 3) alien.minions.push(spawnMinionNear(alien.dir, alien.fromRaid));
  }
}

function updateUfo(alien, dt) {
  const def = alien.def;
  if (alien.state === 'seek') {
    if (!alien.targetPlot) {
      alien.targetPlot = nearestPlot(alien.dir, (p) => p.state === 'growing' || p.state === 'ready');
    }
    if (alien.targetPlot) {
      stepDirTowards(alien.dir, alien.targetPlot.dir, def.speed, dt);
      const dist = alien.dir.angleTo(alien.targetPlot.dir) * PLANET_R;
      if (dist < 0.3) {
        alien.state = 'beam';
        alien.beamT = 4;
        alien.mesh.userData.beam.visible = true;
      }
    } else {
      stepDirTowards(alien.dir, world.houseDir, def.speed * 0.3, dt);
    }
  } else if (alien.state === 'beam') {
    alien.beamT -= dt;
    if (alien.beamT <= 0) {
      const plot = alien.targetPlot;
      if (plot && (plot.state === 'growing' || plot.state === 'ready')) resetPlotToEmpty(plot);
      alien.mesh.userData.beam.visible = false;
      alien.targetPlot = null;
      alien.state = 'seek';
    }
  }
  alien.pos.copy(alien.dir).multiplyScalar(PLANET_R + alien.alt);
  alien.mesh.position.copy(alien.pos);
  alien.mesh.quaternion.setFromUnitVectors(_Y, alien.dir);
}

// Backward iteration: raider ascend-despawn (killAlienSilently) and other mid-loop removals
// splice `enemies` in place, which would skip an element under forward iteration.
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const alien = enemies[i];
    if (!alien.alive) continue;
    updateFlash(alien, dt);
    switch (alien.type) {
      case 'grunt': case 'shieldbearer': updateGruntLike(alien, dt); break;
      case 'hopper': updateHopper(alien, dt); break;
      case 'raider': updateRaider(alien, dt); break;
      case 'spitter': updateSpitter(alien, dt); break;
      case 'brute': updateBrute(alien, dt); break;
      case 'summoner': updateSummoner(alien, dt); break;
      case 'ufo': updateUfo(alien, dt); break;
    }
  }
}

// ----- Pickups: coins (kills) + produce (raider drops) -----
const coinGeo = new THREE.OctahedronGeometry(0.18, 0);
const coinMat = new THREE.MeshLambertMaterial({ color: 0xffd76a, emissive: 0xffaa22, emissiveIntensity: 0.3 });
let pickups = [];

function dropCoins(pos, total) {
  const baseDir = pos.clone().normalize();
  const count = Math.max(1, Math.min(4, Math.round(total / 6)));
  const per = Math.floor(total / count);
  const remainder = total - per * count;
  const upHelper = Math.abs(baseDir.y) < 0.9 ? _Y : new THREE.Vector3(1, 0, 0);
  for (let i = 0; i < count; i++) {
    const value = per + (i < remainder ? 1 : 0);
    const perp = new THREE.Vector3().crossVectors(baseDir, upHelper).normalize();
    perp.applyAxisAngle(baseDir, Math.random() * Math.PI * 2);
    const coinDir = baseDir.clone().applyAxisAngle(perp, (0.3 + Math.random() * 0.5) / PLANET_R).normalize();
    const mesh = new THREE.Mesh(coinGeo, coinMat);
    mesh.position.copy(coinDir).multiplyScalar(PLANET_R + 0.3);
    scene.add(mesh);
    pickups.push({ kind: 'coin', value, mesh, dir: coinDir });
  }
}

function dropProducePickup(pos, cropId) {
  const dir = pos.clone().normalize();
  const crop = CROPS[cropId];
  const mat = new THREE.SpriteMaterial({ map: makeIconTexture(crop.icon), transparent: true, depthTest: false });
  const mesh = new THREE.Sprite(mat);
  mesh.scale.set(0.6, 0.6, 1);
  mesh.position.copy(dir).multiplyScalar(PLANET_R + 0.3);
  scene.add(mesh);
  pickups.push({ kind: 'produce', id: cropId, mesh, dir });
}

function collectPickup(p) {
  if (p.kind === 'coin') earn(p.value);
  else if (p.kind === 'produce') { inventory.produce[p.id]++; toast('+1 ' + CROPS[p.id].name); }
  else if (p.kind === 'seed') { inventory.seeds[p.id]++; toast('+1 ' + CROPS[p.id].name + ' seed'); updateSeedBar(); }
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    const dist = playerUp(_alienV1).angleTo(p.dir) * PLANET_R;
    if (dist < 3) stepDirTowards(p.dir, playerUp(_alienV2), 10, dt);
    p.mesh.position.copy(p.dir).multiplyScalar(PLANET_R + 0.3);
    if (p.kind === 'coin') p.mesh.rotation.y += dt * 5;
    if (dist < 1.2) {
      collectPickup(p);
      scene.remove(p.mesh);
      pickups.splice(i, 1);
    }
  }
}

// ----- Raid director -----
G.raid = { next: 75, active: false, count: 0 };

function unlockedPool() {
  const pool = ['grunt', 'hopper'];
  if (G.partsOwned >= 1) pool.push('raider', 'spitter');
  if (G.partsOwned >= 2) pool.push('brute', 'shieldbearer');
  if (G.partsOwned >= 4) pool.push('summoner', 'ufo');
  return pool;
}

function startRaid() {
  G.raid.active = true;
  const pool = unlockedPool();
  const want = Math.min(2 + 2 * G.partsOwned, 12);
  const room = Math.max(0, 12 - enemies.filter((e) => e.alive).length);
  const n = Math.min(want, room);
  G.raid.count = n;
  for (let i = 0; i < n; i++) {
    const typeId = pool[Math.floor(Math.random() * pool.length)];
    const alien = spawnAlien(typeId);
    alien.fromRaid = true;
  }
}

function updateRaidDirector(dt) {
  if (G.state !== 'playing') return; // paused during shop; already-spawned aliens keep updating via updateEnemies
  if (!G.raid.active) {
    const prev = G.raid.next;
    G.raid.next -= dt;
    if (prev > 5 && G.raid.next <= 5) showBanner('⚠ Alien raid incoming!');
    if (G.raid.next <= 0) startRaid();
  } else {
    const anyLeft = enemies.some((e) => e.alive && e.fromRaid);
    if (!anyLeft) {
      G.raid.active = false;
      G.raid.count = 0;
      G.raid.next = 60 + Math.random() * 60;
      toast('The skies are quiet again... for now.');
    }
  }
}

// ----- Player HP: damage, regen, downed/respawn flow -----
function flashHurtVignette() {
  const el = document.getElementById('hurt-vignette');
  el.style.transition = 'none';
  el.style.opacity = '1';
  void el.offsetWidth; // force reflow so the transition below actually animates 1 -> 0
  el.style.transition = 'opacity 0.4s ease';
  el.style.opacity = '0';
}

function damagePlayer(n) {
  if (G.state === 'downed') return; // already down; ignore further hits until respawn completes
  player.hp = Math.max(0, player.hp - n);
  player.lastHurt = G.time;
  flashHurtVignette();
  updateHUD();
  if (player.hp <= 0) downPlayer();
}

function updatePlayerRegen(dt) {
  if (player.hp < player.maxHp && (G.time - player.lastHurt) > 5) {
    player.hp = Math.min(player.maxHp, player.hp + 5 * dt);
    updateHUD();
  }
}

function downPlayer() {
  G.state = 'downed';
  document.getElementById('downed-screen').style.display = 'flex';
  setTimeout(() => {
    G.money = Math.floor(G.money * 0.9);
    movePlayerToDir(world.houseDoorDir);
    player.hp = player.maxHp;
    updateHUD();
    document.getElementById('downed-screen').style.display = 'none';
    G.state = 'playing';
  }, 3000);
}

// ----- Picking: raycast mouse -> plot / door / planet('space') -----
function pickWorld(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  _ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  _ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  _raycaster.setFromCamera(_ndc, camera);
  const hits = _raycaster.intersectObjects(pickables, true);
  if (hits.length === 0) return { kind: 'space', ref: null, point: null };
  const point = hits[0].point;
  let obj = hits[0].object;
  while (obj) {
    const pick = obj.userData.pick;
    if (pick) {
      if (pick.kind === 'space') return { kind: 'space', ref: null, point };
      return { kind: pick.kind, ref: pick.ref !== undefined ? pick.ref : obj, point };
    }
    obj = obj.parent;
  }
  return { kind: 'space', ref: null, point };
}

const _farPoint = new THREE.Vector3();
window.addEventListener('mousedown', (e) => {
  if (e.button !== 0 || G.state !== 'playing' || cam.dragging) return;

  // Aim assist runs before the world raycast: a click near an alive enemy's screen
  // position shoots at it directly, bypassing plot/door/space routing entirely.
  const assistTarget = findAimAssistTarget(e);
  if (assistTarget) { shootAt(assistTarget.pos); return; }

  const hit = pickWorld(e);
  switch (hit.kind) {
    case 'plot': {
      const plot = hit.ref;
      const dist = playerUp(_v1).angleTo(plot.dir) * PLANET_R;
      if (dist > PLOT_RANGE) toast('Walk closer to the plot');
      else interactPlot(plot);
      break;
    }
    case 'door':
      tryOpenShopDoor();
      break;
    case 'enemy': // never matches until Task 8 registers enemy meshes in pickables
      shootAt(hit.point);
      break;
    case 'star': // never matches until Task 9 registers the falling star in pickables
      shootAt(hit.point);
      break;
    case 'space':
    default: {
      let point = hit.point;
      if (!point) { // clicked empty sky: unproject to a far point along the click ray
        _raycaster.ray.at(60, _farPoint);
        point = _farPoint;
      }
      shootAt(point);
      break;
    }
  }
});

window.addEventListener('keydown', (e) => {
  if (e.repeat || G.state !== 'playing') return;
  const idx = SEED_HOTKEYS.indexOf(e.code);
  if (idx !== -1) {
    G.selectedSeed = SEED_ORDER[idx];
    updateSeedBar();
  }
  if (e.code === 'KeyE') tryOpenShopDoor();
});

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Escape' && G.state === 'shop') closeShop();
});

function boot() {
  G.state = 'menu';
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.prepend(renderer.domElement);
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0f1e);
  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, PLANET_R + 8, PLANET_R + 14);
  camera.lookAt(0, PLANET_R, 0);
  buildWorld();
  buildPlayer();
  world.planet.userData.pick = { kind: 'space' };
  pickables.push(world.planet, world.doorMesh);
  buildPlots();
  buildShip();
  buildCombat();
  updateHUD();
  updateSeedBar();
  setupShopUI();
  setupVictoryUI();
  G.state = 'playing'; // TEMP: until Task 10 start screen
  document.getElementById('start-screen').style.display = 'none'; // TEMP: Task 10 wires the real menu flow
  let last = performance.now();
  (function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - last) / 1000, 0.05); last = now;
    if (G.state === 'playing' || G.state === 'shop') update(dt);
    render(dt);
  })(performance.now());
}

// Populated by later tasks (crops, enemies, ship, etc.).
function update(dt) {
  G.time += dt;
  updatePlayer(dt);
  updateCamera(dt);
  updatePlots(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updatePickups(dt);
  updateTeleportFlashes(dt);
  updateRaidDirector(dt);
  updatePlayerRegen(dt);
}

// Launch is driven from here (rather than a gate in update()/the loop) since it needs to run
// every frame while G.state === 'launch', a state the loop deliberately excludes from update()
// so player input and updateCamera stay frozen during the cinematic.
function render(dt) {
  if (G.state === 'launch') updateLaunch(dt);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if (!renderer || !camera) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

window.addEventListener('DOMContentLoaded', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('no-internet').style.display = 'flex';
    return; // boot() never runs
  }
  boot();
});
</script>
